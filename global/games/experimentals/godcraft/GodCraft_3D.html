<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>GodCraft 3D</title><style>
html,body{margin:0;overflow:hidden;background:#07111f;color:white;font-family:system-ui,Segoe UI,Arial}#ui{position:fixed;inset:0;pointer-events:none}.panel{position:absolute;background:rgba(5,10,25,.78);border:1px solid rgba(120,220,255,.45);border-radius:14px;padding:12px;box-shadow:0 0 25px rgba(0,180,255,.15)}#top{left:12px;top:12px}#right{right:12px;top:12px;width:330px;max-height:80vh;overflow:auto;pointer-events:auto}#bottom{left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:8px;pointer-events:auto}.slot{width:58px;height:58px;border:2px solid #456;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;text-align:center;cursor:pointer}.slot.sel{border-color:#7ff;background:rgba(80,220,255,.22)}button{border:0;border-radius:10px;padding:9px 11px;background:#246bff;color:white;font-weight:900;cursor:pointer;margin:4px}button:hover{filter:brightness(1.15)}button.god{background:linear-gradient(90deg,#ffd447,#ff7b00);color:#1a0c00}.small{font-size:12px;opacity:.82}.title{font-size:20px;font-weight:1000;color:#67e8f9}#cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:1000;color:white;text-shadow:0 0 8px #000;pointer-events:none}#msg{position:fixed;left:50%;top:80px;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid #6ff;border-radius:999px;padding:9px 20px;font-weight:900;opacity:0;transition:.2s;pointer-events:none}
</style></head><body><div id="cross">+</div><div id="msg"></div><div id="ui"><div id="top" class="panel"></div><div id="right" class="panel"></div><div id="bottom" class="panel"></div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x83c9ff);scene.fog=new THREE.Fog(0x83c9ff,45,145);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xbde8ff,0x334422,1.4));const sun=new THREE.DirectionalLight(0xffffff,1.7);sun.position.set(40,70,20);sun.castShadow=true;scene.add(sun);
const world=new Map(),meshes=new Map(),enemies=[],key={};let selected=0,yaw=0,pitch=0,vel=new THREE.Vector3(),onGround=false;let mouseLocked=false;
let player={pos:new THREE.Vector3(0,18,6),hp:100,maxHp:100,armor:0,weapon:'Fist',godPower:0};
let inv={dirt:0,stone:0,wood:0,iron:0,gold:0,diamond:0,obsidian:0,starShard:0,voidCrystal:0,dragonCore:0,worldHeart:0,godIngot:0,godSpear:0,godSword:0,godMace:0,godAxe:0,godHelmet:0,godChestplate:0,godBelt:0,godNecklace:0,godLeggings:0,godBoots:0};
const blockTypes={dirt:{color:0x7a4b2a,hp:1,drop:'dirt'},grass:{color:0x3fa34d,hp:1,drop:'dirt'},stone:{color:0x888888,hp:2,drop:'stone'},wood:{color:0x8b5527,hp:2,drop:'wood'},leaves:{color:0x2e8b39,hp:1,drop:'wood'},iron:{color:0xb8b8b8,hp:4,drop:'iron'},gold:{color:0xffc933,hp:4,drop:'gold'},diamond:{color:0x4ee8ff,hp:5,drop:'diamond'},obsidian:{color:0x191025,hp:9,drop:'obsidian'},star:{color:0xfef08a,hp:10,drop:'starShard'},void:{color:0x7c3aed,hp:11,drop:'voidCrystal'},dragon:{color:0xff4545,hp:12,drop:'dragonCore'},heart:{color:0xff6ad5,hp:18,drop:'worldHeart'}};
const placeables=['dirt','stone','wood','obsidian','diamond','gold','iron'];
function k(x,y,z){return `${x},${y},${z}`}function getB(x,y,z){return world.get(k(x,y,z))}
function setB(x,y,z,type){const kk=k(x,y,z);if(type==null){world.delete(kk);const m=meshes.get(kk);if(m){scene.remove(m);m.geometry.dispose();m.material.dispose();meshes.delete(kk)}return}world.set(kk,type);if(meshes.has(kk))return;const m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:blockTypes[type].color,roughness:.9}));m.position.set(x+.5,y+.5,z+.5);m.castShadow=m.receiveShadow=true;m.userData={x,y,z,type};scene.add(m);meshes.set(kk,m)}
function noise(x,z){return Math.sin(x*.24)*2+Math.cos(z*.18)*2+Math.sin((x+z)*.11)*2}
function gen(){for(let x=-30;x<=30;x++)for(let z=-30;z<=30;z++){const h=Math.floor(7+noise(x,z));for(let y=0;y<=h;y++){let t=y===h?'grass':y>h-3?'dirt':'stone';if(y<h-3&&Math.random()<.025)t='iron';if(y<h-5&&Math.random()<.016)t='gold';if(y<h-7&&Math.random()<.011)t='diamond';if(y<3&&Math.random()<.025)t='obsidian';setB(x,y,z,t)}if(Math.random()<.035){for(let y=h+1;y<h+5;y++)setB(x,y,z,'wood');for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++)for(let dy=3;dy<=5;dy++)if(Math.abs(dx)+Math.abs(dz)+Math.random()<4)setB(x+dx,h+dy,z+dz,'leaves')}}for(let i=0;i<22;i++){const x=Math.floor(Math.random()*56-28),z=Math.floor(Math.random()*56-28);let y=25;while(y>0&&!getB(x,y-1,z))y--;const a=['star','void','dragon','heart'];setB(x,y+1,z,a[i%4]);setB(x+1,y+1,z,'obsidian');setB(x-1,y+1,z,'obsidian');setB(x,y+1,z+1,'obsidian');setB(x,y+1,z-1,'obsidian')}}gen();
function spawnEnemy(){const a=Math.random()*Math.PI*2,r=24+Math.random()*23,x=Math.cos(a)*r,z=Math.sin(a)*r;let y=25;while(y>1&&!getB(Math.floor(x),Math.floor(y-1),Math.floor(z)))y--;const m=new THREE.Mesh(new THREE.BoxGeometry(.8,1.6,.8),new THREE.MeshStandardMaterial({color:0x8b0000,emissive:0x300000}));m.position.set(x,y+1,z);m.castShadow=true;scene.add(m);enemies.push({mesh:m,hp:80,speed:2.1,atk:8,cd:0})}for(let i=0;i<8;i++)spawnEnemy();setInterval(()=>{if(enemies.length<18)spawnEnemy()},4500);
function toast(s){const el=document.getElementById('msg');el.textContent=s;el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,1600)}function add(item,n=1){inv[item]=(inv[item]||0)+n;renderUI()}function spend(cost){for(const k in cost)if((inv[k]||0)<cost[k])return false;for(const k in cost)inv[k]-=cost[k];return true}
function craftGodIngot(){const cost={diamond:12,obsidian:24,starShard:4,voidCrystal:4,dragonCore:2,worldHeart:1,gold:30};if(!spend(cost)){toast('Need absurd rare resources.');return}add('godIngot',1);toast('Forged 1 God Ingot.')}window.craftGodIngot=craftGodIngot;
const godRecipes={godSpear:{name:'God Spear',cost:{godIngot:3,starShard:8,diamond:20},power:55},godSword:{name:'God Sword',cost:{godIngot:4,voidCrystal:8,diamond:24},power:70},godMace:{name:'God Mace',cost:{godIngot:5,dragonCore:8,obsidian:40},power:95},godAxe:{name:'God Axe',cost:{godIngot:4,worldHeart:3,wood:80},power:80},godHelmet:{name:'God Helmet',cost:{godIngot:2,diamond:18,starShard:4},armor:10},godChestplate:{name:'God Chestplate',cost:{godIngot:5,diamond:35,voidCrystal:6},armor:26},godBelt:{name:'God Belt',cost:{godIngot:2,gold:40,dragonCore:2},armor:7},godNecklace:{name:'God Necklace',cost:{godIngot:3,worldHeart:2,starShard:10},armor:12},godLeggings:{name:'God Leggings',cost:{godIngot:4,diamond:28,obsidian:25},armor:18},godBoots:{name:'God Boots',cost:{godIngot:2,diamond:16,voidCrystal:4},armor:9}};
function craftGod(id){const r=godRecipes[id];if(inv[id]){toast('Already crafted.');return}if(!spend(r.cost)){toast('Not enough for '+r.name);return}inv[id]=1;if(r.power){player.weapon=r.name;player.godPower=Math.max(player.godPower,r.power)}if(r.armor){player.armor+=r.armor;player.maxHp+=r.armor*2;player.hp=player.maxHp}toast('Crafted '+r.name+'!');renderUI()}window.craftGod=craftGod;
const raycaster=new THREE.Raycaster();function aimedBlock(){raycaster.setFromCamera({x:0,y:0},camera);const hits=raycaster.intersectObjects([...meshes.values()],false);return hits[0]||null}
function mine(){const hit=aimedBlock();if(!hit||hit.distance>6)return;const {x,y,z,type}=hit.object.userData;add(blockTypes[type].drop,1);setB(x,y,z,null);toast('Mined '+type)}
function place(){const type=placeables[selected];if((inv[type]||0)<=0){toast('No '+type);return}const hit=aimedBlock();if(!hit||hit.distance>6)return;const n=hit.face.normal,p=hit.object.userData,x=p.x+n.x,y=p.y+n.y,z=p.z+n.z;if(getB(x,y,z))return;inv[type]--;setB(x,y,z,type);renderUI()}
function attack(){const dmg=8+player.godPower;raycaster.setFromCamera({x:0,y:0},camera);const hits=raycaster.intersectObjects(enemies.map(e=>e.mesh),false);if(hits[0]&&hits[0].distance<8){const e=enemies.find(e=>e.mesh===hits[0].object);e.hp-=dmg;toast(player.weapon+' hit: '+dmg);if(player.weapon==='God Spear')for(const o of enemies)if(o!==e&&o.mesh.position.distanceTo(e.mesh.position)<5)o.hp-=dmg*.35;if(player.weapon==='God Mace')for(const o of enemies)if(o.mesh.position.distanceTo(e.mesh.position)<4)o.hp-=dmg*.6;if(player.weapon==='God Axe'){add('wood',1);e.hp-=20}if(player.weapon==='God Sword')player.hp=Math.min(player.maxHp,player.hp+4)}}
addEventListener('mousedown',e=>{if(document.pointerLockElement!==renderer.domElement){renderer.domElement.requestPointerLock();return}if(e.button===0)mine();if(e.button===1)attack();if(e.button===2)place()});addEventListener('contextmenu',e=>e.preventDefault());addEventListener('keydown',e=>{key[e.code]=true;const n=parseInt(e.key);if(n>=1&&n<=7){selected=n-1;renderUI()}});addEventListener('keyup',e=>key[e.code]=false);addEventListener('mousemove',e=>{if(document.pointerLockElement===renderer.domElement){yaw-=e.movementX*.0025;pitch-=e.movementY*.0025;pitch=Math.max(-1.45,Math.min(1.45,pitch))}});
function collide(pos){const x=Math.floor(pos.x),y=Math.floor(pos.y),z=Math.floor(pos.z);return getB(x,y,z)||getB(x,y+1,z)}
function updatePlayer(dt){camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;const forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));let wish=new THREE.Vector3();if(key.KeyW)wish.add(forward);if(key.KeyS)wish.sub(forward);if(key.KeyD)wish.add(right);if(key.KeyA)wish.sub(right);if(wish.length()>0)wish.normalize().multiplyScalar(key.ShiftLeft?8:5);vel.x=wish.x;vel.z=wish.z;vel.y-=18*dt;if(onGround&&key.Space){vel.y=7.2;onGround=false}let next=player.pos.clone().addScaledVector(vel,dt);if(!collide(new THREE.Vector3(next.x,player.pos.y,player.pos.z)))player.pos.x=next.x;if(!collide(new THREE.Vector3(player.pos.x,player.pos.y,next.z)))player.pos.z=next.z;if(!collide(new THREE.Vector3(player.pos.x,next.y,player.pos.z))){player.pos.y=next.y;onGround=false}else{if(vel.y<0)onGround=true;vel.y=0}if(player.pos.y<-20){player.pos.set(0,25,0);player.hp-=20}camera.position.copy(player.pos).add(new THREE.Vector3(0,1.6,0))}
function updateEnemies(dt){for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(e.hp<=0){scene.remove(e.mesh);enemies.splice(i,1);if(Math.random()<.45)add('starShard',1);if(Math.random()<.28)add('voidCrystal',1);if(Math.random()<.18)add('dragonCore',1);if(Math.random()<.08)add('worldHeart',1);continue}const dir=player.pos.clone().sub(e.mesh.position);dir.y=0;const d=dir.length();if(d>1.5){dir.normalize();e.mesh.position.addScaledVector(dir,e.speed*dt)}else{e.cd-=dt;if(e.cd<=0){player.hp-=Math.max(1,e.atk-player.armor*.25);e.cd=1;toast('Enemy hit you!')}}}if(player.hp<=0){player.hp=player.maxHp;player.pos.set(0,22,0);toast('You died and respawned.')}}
function renderUI(){document.getElementById('top').innerHTML=`<div class="title">GodCraft 3D</div><div class="small">WASD move • Space jump • Click lock mouse • Left mine • Right place • Middle attack • 1-7 block select</div><b>HP:</b> ${Math.ceil(player.hp)}/${player.maxHp} &nbsp; <b>Armor:</b> ${player.armor} &nbsp; <b>Weapon:</b> ${player.weapon}`;document.getElementById('bottom').innerHTML=placeables.map((b,i)=>`<div class="slot ${selected===i?'sel':''}" onclick="window.sel(${i})">${b}<br>${inv[b]||0}</div>`).join('');document.getElementById('right').innerHTML=`<div class="title">God Crafting</div><div class="small">Rare blocks spawn in obsidian shrines. Enemies can drop rare resources too.</div><hr>${['iron','gold','diamond','obsidian','starShard','voidCrystal','dragonCore','worldHeart','godIngot'].map(k=>`<b>${k}:</b> ${inv[k]||0}<br>`).join('')}<hr><button class="god" onclick="craftGodIngot()">Forge God Ingot</button><div class="small">Cost: 12 diamond, 24 obsidian, 4 starShard, 4 voidCrystal, 2 dragonCore, 1 worldHeart, 30 gold</div><hr>${Object.entries(godRecipes).map(([id,r])=>`<button class="god" onclick="craftGod('${id}')">${r.name}</button><div class="small">Cost: ${Object.entries(r.cost).map(([k,v])=>`${v} ${k}`).join(', ')}</div>`).join('')}`}
window.sel=i=>{selected=i;renderUI()};let last=performance.now();function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;updatePlayer(dt);updateEnemies(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}renderUI();requestAnimationFrame(loop);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script></body></html>
