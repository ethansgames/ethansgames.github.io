<!doctype html><html><head><meta charset="utf-8"><title>Deep Transit: Wilderness</title><style>
html,body{margin:0;overflow:hidden;background:#02060b;font-family:Arial;color:white}#hud{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.48);border:1px solid rgba(160,210,255,.25);border-radius:12px;padding:12px 16px;font-weight:800;font-size:18px;line-height:1.35;text-shadow:0 2px 3px #000;pointer-events:none}#msg{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:12px 22px;font-size:20px;font-weight:700;max-width:780px;text-align:center}#cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;color:#dff6ff;text-shadow:0 0 12px #9adfff;pointer-events:none}.menu{position:fixed;inset:0;background:radial-gradient(circle at center,#101927,#02050a 70%);display:flex;align-items:center;justify-content:center;z-index:5}.card{width:min(840px,90vw);padding:35px;background:rgba(4,8,15,.88);border:1px solid #33475f;border-radius:22px;text-align:center;box-shadow:0 0 60px #000}.card h1{font-size:52px;margin:0 0 12px}.card p{font-size:20px;color:#cfe5ff}.card button{font-size:28px;font-weight:900;padding:18px 46px;border:0;border-radius:14px;cursor:pointer}#jump{position:fixed;inset:0;background:#200;display:none;z-index:4;align-items:center;justify-content:center;font-size:90px;font-weight:1000;color:#fff;text-shadow:0 0 20px red}#hurt{position:fixed;inset:0;box-shadow:inset 0 0 160px rgba(255,0,0,.7);display:none;pointer-events:none}#hint{position:fixed;right:15px;bottom:15px;color:#bcd6ef;background:rgba(0,0,0,.45);padding:10px 14px;border-radius:10px;font-weight:700}</style></head><body>
<div class="menu" id="menu"><div class="card"><h1>DEEP TRANSIT: WILDERNESS</h1><p>Night rain, abandoned villages, forest doors, lantern trails, monsters, jumpscares.</p><p><b>WASD</b> move • <b>Mouse</b> look • <b>Shift</b> sprint • <b>F</b> flashlight • <b>E</b> interact • <b>Click game to lock mouse</b></p><button id="start">PLAY</button></div></div>
<div id="hud"></div><div id="cross">+</div><div id="msg">Click PLAY. Then click anytime to lock mouse.</div><div id="jump">DON'T LOOK AWAY</div><div id="hurt"></div><div id="hint">E interact • F flashlight</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
let scene,camera,renderer,clock; let keys={}, yaw=0,pitch=0,locked=false; let area=1,hp=100,stamina=100,flash=82,bats=3,locks=1,med=1,hasKey=false; let objs=[],loot=[],doors=[],monsters=[],houses=[],lanterns=[],rain=[]; let player={pos:new THREE.Vector3(0,2,0),vel:new THREE.Vector3()}; let flashLight,flashCone,moon; const hud=document.getElementById('hud'),msg=document.getElementById('msg'),jump=document.getElementById('jump'),hurt=document.getElementById('hurt'),menu=document.getElementById('menu');
const mat=(c)=>new THREE.MeshLambertMaterial({color:c}); const mats={ground:mat(0x101818),trail:mat(0x463828),wood:mat(0x2b1b12),roof:mat(0x111016),wall:mat(0x253438),leaf:mat(0x06130d),trunk:mat(0x1a1009),monster:mat(0x060606),eye:new THREE.MeshBasicMaterial({color:0xff3333}),door:mat(0x14100d),glow:new THREE.MeshBasicMaterial({color:0xffb24a})};
function init(){scene=new THREE.Scene(); scene.background=new THREE.Color(0x07111d); scene.fog=new THREE.FogExp2(0x07111d,.012); camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,700); renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true; document.body.appendChild(renderer.domElement); clock=new THREE.Clock();
 moon=new THREE.HemisphereLight(0x6688aa,0x050505,1.15); scene.add(moon); let dir=new THREE.DirectionalLight(0x89a9c9,.45); dir.position.set(-70,110,25); scene.add(dir);
 flashLight=new THREE.SpotLight(0xdbefff,5.0,95,Math.PI/6,.55,1.15); camera.add(flashLight); flashLight.position.set(.25,-.15,.2); flashLight.target.position.set(0,0,-1); camera.add(flashLight.target); scene.add(camera);
 let coneGeo=new THREE.ConeGeometry(7,38,32,1,true); let coneMat=new THREE.MeshBasicMaterial({color:0xb9dcff,transparent:true,opacity:.055,depthWrite:false,side:THREE.DoubleSide}); flashCone=new THREE.Mesh(coneGeo,coneMat); flashCone.rotation.x=-Math.PI/2; flashCone.position.z=-21; camera.add(flashCone);
 buildArea(); addEvents(); loop();}
function add(o){scene.add(o);objs.push(o);return o} function clear(){for(const o of objs)scene.remove(o);objs=[];loot=[];doors=[];monsters=[];houses=[];lanterns=[];rain=[];hasKey=false;}
function rand(a,b){return a+Math.random()*(b-a)}
function buildArea(){clear(); player.pos.set(0,2,0); yaw=0; pitch=0; let g=new THREE.Mesh(new THREE.PlaneGeometry(520,520),mats.ground); g.rotation.x=-Math.PI/2; add(g); 
 // winding trail pieces
 for(let i=0;i<24;i++){let z=-i*18, x=Math.sin(i*.7)*14; let t=new THREE.Mesh(new THREE.BoxGeometry(16+Math.sin(i)*4,.04,24),mats.trail); t.position.set(x,.025,z); t.rotation.y=Math.sin(i*.5)*.25; add(t); if(i%4===1)addLantern(x+rand(-9,9),z+rand(-6,6)); if(i%6===2)addHouse(x+rand(18,34)*(Math.random()<.5?-1:1),z+rand(-8,8)); }
 // normal dense-ish forest, not wall garbage
 for(let i=0;i<620;i++){let z=rand(-430,60), pathX=Math.sin((-z/18)*.7)*14; let side=Math.random()<.5?-1:1; let dist=rand(18,210); if(Math.random()<.3)dist=rand(28,70); addTree(pathX+side*dist+rand(-12,12),z,rand(.75,1.9)); if(Math.random()<.65)addBush(pathX+side*rand(13,50),z+rand(-4,4)); }
 // village cluster ahead
 for(let i=0;i<9;i++) addHouse(rand(-65,65), -235+rand(-45,45), true);
 for(let i=0;i<7;i++) addLantern(rand(-48,48),-210-rand(0,90));
 addDoor(0,-430); addLoot(18,-18,'key'); for(let i=0;i<18;i++)addLoot(rand(-85,85),rand(-300,-20),['battery','lockpick','medkit'][i%3]);
 for(let i=0;i<18;i++)addMonster(rand(-160,160),rand(-360,-40),i%4); updateMsg('Follow the muddy trail. Houses have loot. Monsters hide between the trees.');}
function addTree(x,z,s=1){let h=rand(9,18)*s; let tr=new THREE.Mesh(new THREE.CylinderGeometry(.45*s,.75*s,h,7),mats.trunk); tr.position.set(x,h/2,z); add(tr); for(let k=0;k<3;k++){let c=new THREE.Mesh(new THREE.ConeGeometry((4.5-k)*s,7*s,8),mats.leaf); c.position.set(x,h-2+k*2.6,z); add(c);} }
function addBush(x,z){let b=new THREE.Mesh(new THREE.DodecahedronGeometry(rand(1.5,3.2)),mats.leaf); b.scale.y=rand(.45,.9); b.position.set(x,1,z); add(b)}
function addHouse(x,z,big=false){let group=new THREE.Group(); group.position.set(x,0,z); let w=big?rand(11,16):rand(8,11), d=big?rand(12,18):rand(9,13), h=big?5.5:4.2; let floor=new THREE.Mesh(new THREE.BoxGeometry(w,.25,d),mats.wood); floor.position.y=.12; group.add(floor); let back=new THREE.Mesh(new THREE.BoxGeometry(w,h,.35),mats.wall); back.position.set(0,h/2,-d/2); group.add(back); let l=new THREE.Mesh(new THREE.BoxGeometry(.35,h,d),mats.wall); l.position.set(-w/2,h/2,0); group.add(l); let r=l.clone(); r.position.x=w/2; group.add(r); let f1=new THREE.Mesh(new THREE.BoxGeometry(w*.34,h,.35),mats.wall); f1.position.set(-w*.33,h/2,d/2); group.add(f1); let f2=f1.clone(); f2.position.x=w*.33; group.add(f2); let roof=new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*.72,3.2,4),mats.roof); roof.rotation.y=Math.PI/4; roof.position.y=h+1.4; group.add(roof); let table=new THREE.Mesh(new THREE.BoxGeometry(2,.25,1.4),mats.wood); table.position.set(rand(-2,2),1.2,rand(-2,2)); group.add(table); let bed=new THREE.Mesh(new THREE.BoxGeometry(2.2,.5,3),mat(0x263c50)); bed.position.set(rand(-2,2),.55,rand(-3,1)); group.add(bed); group.rotation.y=rand(-.4,.4); add(group); houses.push({x,z,w,d,group,searched:false}); return group;}
function addLantern(x,z){let p=new THREE.Group(); p.position.set(x,0,z); let pole=new THREE.Mesh(new THREE.CylinderGeometry(.12,.16,4.2,8),mats.trunk); pole.position.y=2.1;p.add(pole); let lamp=new THREE.Mesh(new THREE.BoxGeometry(.55,.7,.55),mats.glow); lamp.position.y=4.15;p.add(lamp); let light=new THREE.PointLight(0xffa84b,2.2,35,1.5); light.position.y=3.7;p.add(light); add(p); lanterns.push({g:p,l:light,base:2.2});}
function addDoor(x,z){let d=new THREE.Group(); d.position.set(x,0,z); let frame=new THREE.Mesh(new THREE.BoxGeometry(7,8,.5),mats.door); frame.position.y=4; d.add(frame); let glow=new THREE.Mesh(new THREE.BoxGeometry(5.6,6.5,.12),new THREE.MeshBasicMaterial({color:0x234b62,transparent:true,opacity:.45})); glow.position.set(0,3.7,.31); d.add(glow); add(d); doors.push(d)}
function addLoot(x,z,type){let colors={key:0xffd54a,battery:0x63ddff,lockpick:0xd0d0d0,medkit:0xff3333}; let m=new THREE.Mesh(new THREE.BoxGeometry(1,.45,1),new THREE.MeshBasicMaterial({color:colors[type]})); m.position.set(x,.55,z); add(m); loot.push({mesh:m,type});}
function addMonster(x,z,t){let g=new THREE.Group(); g.position.set(x,0,z); let body=new THREE.Mesh(new THREE.BoxGeometry(t===2?1.2:1.8,t===2?1.2:4.2,t===2?3:1.2),mats.monster); body.position.y=t===2?.8:2.1; g.add(body); let eye1=new THREE.Mesh(new THREE.SphereGeometry(.13,8,8),mats.eye), eye2=eye1.clone(); eye1.position.set(-.35,3.2,.65);eye2.position.set(.35,3.2,.65); if(t===2){eye1.position.set(-.25,1.1,1.6);eye2.position.set(.25,1.1,1.6)} g.add(eye1,eye2); add(g); monsters.push({g,type:t,spd:[5,3.2,7,4][t],cool:0,seen:0});}
function addEvents(){document.getElementById('start').onclick=()=>{menu.style.display='none'; lockMouse();}; renderer.domElement.addEventListener('click',lockMouse); document.addEventListener('pointerlockchange',()=>locked=document.pointerLockElement===renderer.domElement); document.addEventListener('mousemove',e=>{if(!locked)return; yaw-=e.movementX*.0024; pitch-=e.movementY*.0024; pitch=Math.max(-1.35,Math.min(1.35,pitch));}); addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyF'){flashLight.visible=!flashLight.visible;flashCone.visible=flashLight.visible} if(e.code==='KeyE')interact(); if(e.code==='KeyM'&&med>0&&hp<100){med--;hp=Math.min(100,hp+45)}}); addEventListener('keyup',e=>keys[e.code]=false); addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});}
function lockMouse(){renderer.domElement.requestPointerLock?.();}
function interact(){let p=player.pos; for(const l of loot){if(l.mesh.visible&&l.mesh.position.distanceTo(p)<4){l.mesh.visible=false; if(l.type==='key'){hasKey=true;updateMsg('You found the gate key. Find the forest door.')} if(l.type==='battery'){bats++;flash=Math.min(100,flash+25)} if(l.type==='lockpick')locks++; if(l.type==='medkit')med++; return;}} for(const h of houses){let dist=Math.hypot(h.x-p.x,h.z-p.z); if(dist<8&&!h.searched){h.searched=true; addLoot(h.x+rand(-2,2),h.z+rand(-2,2),Math.random()<.45?'battery':Math.random()<.5?'lockpick':'medkit'); updateMsg('You searched the house. Something was left inside.'); return;}} for(const d of doors){if(d.position.distanceTo(p)<8){if(hasKey){area++; if(area>150){updateMsg('You escaped the wilderness.');return} buildArea(); updateMsg('Area '+area+'. The rain follows you.');}else updateMsg('The door is locked. Find the glowing key.');return;}}}
function move(dt){let speed=(keys.ShiftLeft&&stamina>2)?16:9; if(keys.ShiftLeft&&stamina>0)stamina-=35*dt; else stamina=Math.min(100,stamina+20*dt); let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)*-1), r=new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw)); let v=new THREE.Vector3(); if(keys.KeyW)v.add(f); if(keys.KeyS)v.sub(f); if(keys.KeyD)v.add(r); if(keys.KeyA)v.sub(r); if(v.length()>0)v.normalize().multiplyScalar(speed*dt); player.pos.add(v); camera.position.copy(player.pos); camera.rotation.set(pitch,yaw,0,'YXZ');}
function updateMonsters(dt){let near=0; for(const m of monsters){let pos=m.g.position; let to=player.pos.clone().sub(pos); let dist=to.length(); if(dist<55)near++; let chase=dist<55||Math.random()<.003; if(chase){to.y=0;to.normalize(); pos.add(to.multiplyScalar(m.spd*dt)); m.g.lookAt(player.pos.x,pos.y,player.pos.z);} else {pos.x+=Math.sin(performance.now()*.001+m.g.id)*dt*.8; pos.z+=Math.cos(performance.now()*.0013+m.g.id)*dt*.8;} if(dist<3.3&&m.cool<=0){m.cool=2.5; hp-=18; showHurt(); if(Math.random()<.55)jumpscare();} m.cool-=dt;} return near;}
function jumpscare(){jump.style.display='flex'; setTimeout(()=>jump.style.display='none',520)} function showHurt(){hurt.style.display='block';setTimeout(()=>hurt.style.display='none',170)} function updateMsg(s){msg.textContent=s; clearTimeout(updateMsg.t); updateMsg.t=setTimeout(()=>msg.textContent='Follow trails. Enter houses. Lanterns mark safer paths. The woods are not empty.',4500)}
function rainFx(dt){if(rain.length<260){let geo=new THREE.BufferGeometry(), verts=new Float32Array(2*3); geo.setAttribute('position',new THREE.BufferAttribute(verts,3)); let line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x7f9aae,transparent:true,opacity:.38})); add(line); rain.push(line);} for(const line of rain){let x=player.pos.x+rand(-70,70), y=rand(8,45), z=player.pos.z+rand(-70,35); let a=line.geometry.attributes.position.array; a[0]=x;a[1]=y;a[2]=z;a[3]=x-1.6;a[4]=y-5;a[5]=z+.5; line.geometry.attributes.position.needsUpdate=true;}}
function loop(){requestAnimationFrame(loop); let dt=Math.min(.033,clock.getDelta()); if(!menu.style.display||menu.style.display==='none'){move(dt); if(flashLight.visible){flash-=dt*1.6;if(flash<=0){flash=0;flashLight.visible=false;flashCone.visible=false}} lanterns.forEach(o=>o.l.intensity=o.base+Math.sin(performance.now()*.006+o.g.id)*.35); let near=updateMonsters(dt); rainFx(dt); hud.innerHTML=`AREA ${area}/150<br>HP ${Math.max(0,hp|0)} | Stamina ${stamina|0}<br>Flashlight ${flash|0}% | Batteries ${bats}<br>Lockpicks ${locks} | Medkits ${med} | Key ${hasKey?'YES':'NO'}<br>Monsters nearby ${near}`; if(hp<=0){hp=100;player.pos.set(0,2,0);updateMsg('You were dragged back to the trail.');jumpscare();}}
 renderer.render(scene,camera);} init();
</script></body></html>
