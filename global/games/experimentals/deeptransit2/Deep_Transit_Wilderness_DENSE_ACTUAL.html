<!doctype html><html><head><meta charset='utf-8'><title>Deep Transit Wilderness Dense Actual</title><style>
html,body{margin:0;overflow:hidden;background:#02060a;font-family:Arial,Helvetica,sans-serif;color:white}#ui{position:fixed;left:12px;top:10px;background:rgba(0,0,0,.45);border:1px solid rgba(120,170,200,.35);border-radius:12px;padding:12px 16px;font-weight:700;line-height:1.45;z-index:5;text-shadow:0 2px 3px #000}#msg{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:10px 18px;font-size:18px;z-index:5}.cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:30px;color:#d9f1ff;text-shadow:0 0 8px #9de;z-index:4}#menu{position:fixed;inset:0;background:radial-gradient(circle,#0b1922,#020407);display:flex;align-items:center;justify-content:center;z-index:10}#panel{text-align:center;background:rgba(5,8,12,.8);border:1px solid #456;border-radius:18px;padding:34px;max-width:850px}button{font-size:28px;font-weight:900;padding:16px 55px;border-radius:14px;border:0;cursor:pointer}.small{opacity:.75;font-size:16px}</style></head><body>
<div id='menu'><div id='panel'><h1>DEEP TRANSIT: WILDERNESS</h1><h2>Dense Forest Build</h2><p>Night rain. Abandoned villages. Doors spread across a real thick forest.</p><p><b>WASD</b> move • <b>Mouse</b> look • <b>Shift</b> sprint • <b>F</b> flashlight • <b>E</b> interact</p><button id='play'>PLAY</button><p class='small'>Seek 30 • Creaker 75 • Executer 120 • Terminus 150</p></div></div>
<div id='ui'></div><div class='cross'>+</div><div id='msg'>Follow the muddy trail. Houses have loot.</div>
<script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script>
<script>
let scene,camera,renderer,clock=new THREE.Clock(),keys={},yaw=0,pitch=0,velY=0,onGround=true,area=1,hp=100,stam=70,bat=88,batteries=4,locks=1,meds=1,hasKey=false,flashOn=true;
let objects=[],houses=[],loot=[],monsters=[],doors=[],lanterns=[],rainPts,flash,ambient,moon,trail=[];const ui=document.getElementById('ui'),msg=document.getElementById('msg');
const mat=(c)=>new THREE.MeshStandardMaterial({color:c,roughness:.9});const trunkMat=mat(0x221811),pineMat=mat(0x06150f),deadMat=mat(0x1a1511),groundMat=mat(0x101812),trailMat=mat(0x2b211a),woodMat=mat(0x1f1713),roofMat=mat(0x071014);
function addBox(x,y,z,w,h,d,m){let o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);scene.add(o);objects.push(o);return o}
function addTree(x,z,s=1){let h=8+Math.random()*8*s;let trunk=new THREE.Mesh(new THREE.CylinderGeometry(.28*s,.55*s,h,7),trunkMat);trunk.position.set(x,h/2,z);scene.add(trunk);objects.push(trunk);let levels=3+Math.floor(Math.random()*3);for(let i=0;i<levels;i++){let cone=new THREE.Mesh(new THREE.ConeGeometry((3.0-i*.38)*s,(4.5-i*.35)*s,9),pineMat);cone.position.set(x,h*.43+i*1.7,z);scene.add(cone);objects.push(cone)} if(Math.random()<.20){let stump=new THREE.Mesh(new THREE.CylinderGeometry(.5,.7,1.2,7),deadMat);stump.position.set(x+Math.random()*4-2,.6,z+Math.random()*4-2);scene.add(stump);objects.push(stump)} }
function addBush(x,z){let b=new THREE.Mesh(new THREE.DodecahedronGeometry(1.1+Math.random()*1.7,0),mat(0x08180d));b.scale.y=.45;b.position.set(x,.55,z);scene.add(b);objects.push(b)}
function addHouse(x,z,rot=0){let g=new THREE.Group();g.position.set(x,0,z);g.rotation.y=rot;scene.add(g);let wall=mat(0x263231), roof=mat(0x101012), floor=mat(0x201812);function bx(px,py,pz,w,h,d,m){let o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(px,py,pz);g.add(o);objects.push(o);return o}bx(0,.08,0,13,.16,11,floor);bx(-6.5,2.2,0,.4,4.2,11,wall);bx(6.5,2.2,0,.4,4.2,11,wall);bx(0,2.2,-5.5,13,4.2,.4,wall);bx(-3.8,2.2,5.5,5.4,4.2,.4,wall);bx(4.0,2.2,5.5,5.0,4.2,.4,wall);let r=new THREE.Mesh(new THREE.ConeGeometry(9.2,3.2,4),roof);r.rotation.y=Math.PI/4;r.position.set(0,5.8,0);g.add(r);objects.push(r);let door=bx(.5,1.6,5.68,2.4,3.2,.22,mat(0x120b08));door.userData.type='houseDoor';let interiorLight=new THREE.PointLight(0xffb56a,.45,12,2);interiorLight.position.set(x,2.2,z);scene.add(interiorLight);if(Math.random()<.8){let item=new THREE.Mesh(new THREE.BoxGeometry(.8,.35,.8),mat(0xf0d060));item.position.set(x+(Math.random()*5-2.5),.4,z+(Math.random()*5-2.5));scene.add(item);item.userData.type='loot';loot.push(item)}houses.push(g)}
function addLantern(x,z){let pole=addBox(x,2,z,.22,4,.22,mat(0x17120d));let l=new THREE.Mesh(new THREE.BoxGeometry(.8,.7,.8),mat(0xffb352));l.position.set(x,4.2,z);scene.add(l);let p=new THREE.PointLight(0xff9f45,1.7,28,1.6);p.position.set(x,3.2,z);scene.add(p);lanterns.push(p)}
function addDoor(x,z,label){let d=addBox(x,3,z,4.2,6,.35,mat(0x16100d));d.userData.type='nextDoor';let frame=addBox(x,3,z+.05,5.1,7,.18,mat(0x37231a));doors.push(d)}
function addMonster(x,z,type){let color=type==0?0x050505:type==1?0xfff2d0:type==2?0x380808:0x111827;let m=new THREE.Group();m.position.set(x,0,z);scene.add(m);let body=new THREE.Mesh(new THREE.CylinderGeometry(.55,.4,3.8,8),mat(color));body.position.y=2;m.add(body);let head=new THREE.Mesh(new THREE.SphereGeometry(.7,8,8),mat(color));head.position.y=4.2;m.add(head);let eyes=new THREE.Mesh(new THREE.BoxGeometry(1,.12,.08),mat(0xffeeee));eyes.position.set(0,4.35,-.65);m.add(eyes);m.userData={type:'monster',kind:type,speed:.8+Math.random()*1.3};monsters.push(m)}
function genArea(){objects.forEach(o=>scene.remove(o));houses.forEach(o=>scene.remove(o));loot.forEach(o=>scene.remove(o));monsters.forEach(o=>scene.remove(o));doors.forEach(o=>scene.remove(o));lanterns.forEach(o=>scene.remove(o));objects=[];houses=[];loot=[];monsters=[];doors=[];lanterns=[];trail=[];hasKey=false;camera.position.set(0,2.1,0);yaw=0;pitch=0;
let ground=new THREE.Mesh(new THREE.PlaneGeometry(700,700,80,80),groundMat);ground.rotation.x=-Math.PI/2;scene.add(ground);objects.push(ground);
// winding trail made from overlapping flattened boxes
let x=0,z=0; for(let i=0;i<28;i++){trail.push(new THREE.Vector3(x,0,z));let seg=new THREE.Mesh(new THREE.BoxGeometry(12,.05,22),trailMat);seg.position.set(x,.03,z+8);seg.rotation.y=Math.sin(i*.7)*.4;scene.add(seg);objects.push(seg);x+=Math.sin(i*.65)*7;z-=18+Math.random()*8;}
// dense forest: avoid trail corridor only
for(let i=0;i<780;i++){let tx=(Math.random()-.5)*620,tz=(Math.random()-.5)*620-210;let near=trail.some(p=>Math.hypot(p.x-tx,p.z-tz)<10); if(!near)addTree(tx,tz,.75+Math.random()*1.4)}
for(let i=0;i<520;i++){let tx=(Math.random()-.5)*620,tz=(Math.random()-.5)*620-210;let near=trail.some(p=>Math.hypot(p.x-tx,p.z-tz)<6); if(!near)addBush(tx,tz)}
// village clusters on trail
for(let i=3;i<26;i+=5){let p=trail[i],side=(i%2?1:-1);addHouse(p.x+side*(18+Math.random()*12),p.z,Math.random()*6.28);addHouse(p.x-side*(22+Math.random()*18),p.z-10,Math.random()*6.28);if(Math.random()<.6)addHouse(p.x+side*(12+Math.random()*8),p.z-28,Math.random()*6.28);if(i%10==3)addLantern(p.x,p.z-3)}
addDoor(trail[27].x,trail[27].z-18,'NEXT'); // key on/near house
let k=new THREE.Mesh(new THREE.TorusGeometry(.45,.12,8,18),mat(0xffd64a));let kp=trail[8];k.position.set(kp.x+15,.8,kp.z);k.userData.type='key';scene.add(k);loot.push(k);
let count=12+Math.floor(area/8);for(let i=0;i<count;i++){let p=trail[Math.floor(Math.random()*trail.length)];addMonster(p.x+(Math.random()-.5)*90,p.z+(Math.random()-.5)*120,Math.floor(Math.random()*4))}
if([30,75,120,150].includes(area)){let p=trail[18];addMonster(p.x,p.z-20,3);monsters[monsters.length-1].scale.set(4,4,4);msg.textContent= area==30?'SEEK is tearing through the forest.':area==75?'CREAKER is awake under the village.':area==120?'EXECUTER patrols the storm.':'TERMINUS watches from the black sky.'}else msg.textContent='Follow trails. Search houses for the key, then reach the next wilderness door.'}
function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x07101a);scene.fog=new THREE.FogExp2(0x07101a,.012);camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);ambient=new THREE.HemisphereLight(0x7e9ec0,0x081008,.85);scene.add(ambient);moon=new THREE.DirectionalLight(0xaac8ff,.75);moon.position.set(100,180,50);scene.add(moon);flash=new THREE.SpotLight(0xd8ecff,5.5,85,Math.PI/6,.55,1.15);flash.position.copy(camera.position);flash.target.position.set(0,0,-1);scene.add(flash);scene.add(flash.target);makeRain();genArea();animate()}
function makeRain(){let geo=new THREE.BufferGeometry(),arr=[];for(let i=0;i<2000;i++){arr.push((Math.random()-.5)*500,Math.random()*120,(Math.random()-.5)*500)}geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));let m=new THREE.PointsMaterial({color:0x8ba0ad,size:.045,transparent:true,opacity:.55});rainPts=new THREE.Points(geo,m);scene.add(rainPts)}
function interact(){let best=null,bd=5;[...loot,...doors].forEach(o=>{let d=o.position.distanceTo(camera.position);if(d<bd){best=o;bd=d}});if(!best)return; if(best.userData.type==='key'){hasKey=true;scene.remove(best);loot=loot.filter(x=>x!==best);msg.textContent='You found the gate key. Follow the trail to the Door.'}else if(best.userData.type==='loot'){bat=Math.min(100,bat+20);scene.remove(best);loot=loot.filter(x=>x!==best);msg.textContent='Found supplies.'}else if(best.userData.type==='nextDoor'){if(hasKey||locks>0){if(!hasKey)locks--;area++;genArea()}else msg.textContent='Locked. Find the key or use a lockpick.'}}
function animate(){requestAnimationFrame(animate);let dt=Math.min(.033,clock.getDelta());let dir=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)),right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));let move=new THREE.Vector3();if(keys.KeyW)move.add(dir.clone().multiplyScalar(-1));if(keys.KeyS)move.add(dir);if(keys.KeyA)move.add(right.clone().multiplyScalar(-1));if(keys.KeyD)move.add(right);let sp=(keys.ShiftLeft&&stam>0?12:6);if(move.length()>0){move.normalize();camera.position.addScaledVector(move,sp*dt);if(keys.ShiftLeft)stam=Math.max(0,stam-25*dt)}else stam=Math.min(70,stam+13*dt);if(!onGround){velY-=28*dt;camera.position.y+=velY*dt;if(camera.position.y<=2.1){camera.position.y=2.1;velY=0;onGround=true}} if(keys.Space&&onGround){velY=9;onGround=false}camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;flash.visible=flashOn&&bat>0; if(flash.visible)bat=Math.max(0,bat-2.3*dt);flash.position.copy(camera.position);let target=new THREE.Vector3(0,0,-1).applyEuler(camera.rotation).multiplyScalar(15).add(camera.position);flash.target.position.copy(target);flash.target.updateMatrixWorld();
monsters.forEach(m=>{let to=new THREE.Vector3().subVectors(camera.position,m.position);let dist=to.length(); if(dist<75){to.y=0;to.normalize();m.position.addScaledVector(to,m.userData.speed*dt*(dist<20?2.2:1));m.lookAt(camera.position.x,m.position.y,camera.position.z);if(dist<2.5){hp-=18*dt;msg.textContent='Something is clawing at you in the rain!'}}});
let pos=rainPts.geometry.attributes.position;for(let i=1;i<pos.array.length;i+=3){pos.array[i]-=45*dt;if(pos.array[i]<0){pos.array[i]=100;pos.array[i-1]=camera.position.x+(Math.random()-.5)*260;pos.array[i+1]=camera.position.z+(Math.random()-.5)*260}}pos.needsUpdate=true;rainPts.position.x=camera.position.x;rainPts.position.z=camera.position.z;
ui.innerHTML=`AREA ${area}/150<br>HP ${Math.max(0,hp|0)} | Stamina ${stam|0}<br>Flashlight ${bat|0}% | Batteries ${batteries}<br>Lockpicks ${locks} | Medkits ${meds} | Key ${hasKey?'YES':'NO'}<br>Monsters nearby ${monsters.filter(m=>m.position.distanceTo(camera.position)<80).length}`;renderer.render(scene,camera)}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyF')flashOn=!flashOn;if(e.code==='KeyE')interact();if(e.code==='KeyB'&&batteries>0){batteries--;bat=100}if(e.code==='KeyM'&&meds>0){meds--;hp=Math.min(100,hp+45)}});addEventListener('keyup',e=>keys[e.code]=false);addEventListener('mousemove',e=>{if(document.pointerLockElement){yaw-=e.movementX*.0025;pitch-=e.movementY*.0025;pitch=Math.max(-1.35,Math.min(1.35,pitch))}});document.getElementById('play').onclick=()=>{document.getElementById('menu').style.display='none';document.body.requestPointerLock();};init();
</script></body></html>
