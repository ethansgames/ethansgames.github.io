<!DOCTYPE html><html><head><meta charset="UTF-8"><title>POPCORN FINAL</title>
<style>body{margin:0;overflow:hidden;background:black;}canvas{position:absolute;top:0;left:0;}</style>
</head><body><canvas id="c"></canvas><script>
const c=document.getElementById("c"),ctx=c.getContext("2d");
let W=innerWidth,H=innerHeight;c.width=W;c.height=H;

let phase=1,dead=0,alive=1,keys={};
const bossActive={butter:1,salt:0,fire:0,magnet:0};

onkeydown=e=>keys[e.key.toLowerCase()]=1;
onkeyup=e=>keys[e.key.toLowerCase()]=0;

const player={x:W/2,y:H/2,r:15};
function movePlayer(){
 if(!alive)return;let s=3;
 if(keys.w)player.y-=s;if(keys.s)player.y+=s;
 if(keys.a)player.x-=s;if(keys.d)player.x+=s;
 if(player.x<player.r)player.x=player.r;
 if(player.x>W-player.r)player.x=W-player.r;
 if(player.y<player.r)player.y=player.r;
 if(player.y>H-player.r)player.y=H-player.r;
}

class CPU{
 constructor(){
  this.alive=1;this.r=10;
  this.x=Math.random()*W;this.y=Math.random()*H;
  this.vx=Math.random()*2-1;this.vy=Math.random()*2-1;
 }
 update(){
  if(!this.alive)return;
  this.x+=this.vx;this.y+=this.vy;
  if(this.x<this.r||this.x>W-this.r)this.vx*=-1;
  if(this.y<this.r||this.y>H-this.r)this.vy*=-1;
 }
 draw(){
  if(!this.alive)return;
  ctx.fillStyle="#4bf";ctx.beginPath();
  ctx.arc(this.x,this.y,this.r,0,6.28);ctx.fill();
 }
}

let cpus=[...Array(60)].map(_=>new CPU());
function hit(ax,ay,ar,bx,by,br){return Math.hypot(ax-bx,ay-by)<ar+br}

let bw=[],bb=[],sw=[],sb=[],srw=[],srd=[],fw=[],fb=[],bars=[],mb=[],beam=[],magStart=0,magStarted=0;
function clearAllAttacks(){bw=[];bb=[];sw=[];sb=[];srw=[];srd=[];fw=[];fb=[];bars=[];mb=[];beam=[];}
// BUTTER PHASE 1
function butterAtk(){
 let cx=W/2,cy=120,o=Math.random()*6.28;
 for(let i=0;i<20;i++){
  let a=o+i*(6.28/20);
  bw.push({x1:cx,y1:cy,x2:cx+Math.cos(a)*2000,y2:cy+Math.sin(a)*2000,life:2});
 }
 setTimeout(()=>{
  for(let i=0;i<20;i++){
   let a=o+i*(6.28/20);
   bb.push({x:cx,y:cy,vx:Math.cos(a)*2,vy:Math.sin(a)*2,r:7});
  }
 },2000);
}
setInterval(()=>{if(phase==1)butterAtk()},3500);


// SALT PHASE 2
function saltShot(){
 let cx=W/2,cy=150,t=[player,...cpus.filter(c=>c.alive)],
     T=t[Math.floor(Math.random()*t.length)],
     dx=T.x-cx,dy=T.y-cy,d=Math.hypot(dx,dy)||1;
 sw.push({x1:cx,y1:cy,x2:cx+dx/d*2000,y2:cy+dy/d*2000,life:2});
 setTimeout(()=>sb.push({x:cx,y:cy,vx:dx/d*3,vy:dy/d*3,r:7}),2000);
}

function saltRain(){
 for(let i=0;i<20;i++){
  let rx=Math.random()*W;
  srw.push({x:rx,y:H-30,r:20,life:2});
  setTimeout(()=>srd.push({x:rx,y:-20,r:10,vy:7}),2000);
 }
}

setInterval(()=>{if(phase==2)saltShot()},2500);
setInterval(()=>{if(phase==2)saltRain()},3500);


// FIRE PHASE 3
function fireAtk(){
 let cx=W/2,cy=150,o=Math.random()*6.28;
 for(let i=0;i<5;i++){
  let a=o+i*(6.28/5);
  fw.push({x1:cx,y1:cy,x2:cx+Math.cos(a)*2000,y2:cy+Math.sin(a)*2000,life:2});
 }
 setTimeout(()=>{
  for(let i=0;i<5;i++){
   let a=o+i*(6.28/5);
   fb.push({x:cx,y:cy,vx:Math.cos(a)*3,vy:Math.sin(a)*3,r:9});
  }
 },2000);
}

function spawnBars(){
 bars.push({x:W/2,y:-150,vx:2,vy:2,a:0,n:12});
 bars.push({x:W/2,y:H+150,vx:-2,vy:-2,a:0,n:12});
}

setInterval(()=>{if(phase==3)fireAtk()},3500);
setInterval(()=>{if(phase==3)spawnBars()},4000);


// MAGNETRON PHASE 4
function magProj(){
 let cx=W/2,cy=150;
 for(let i=0;i<40;i++){
  if(i%5==0)continue;
  let a=i*(6.28/40);
  mb.push({x:cx,y:cy,vx:Math.cos(a)*1.3,vy:Math.sin(a)*1.3,r:8});
 }
}

function magBeam(){
 let cx=W/2,cy=150;
 beam=[
  {cx,cy,a:0,life:3},
  {cx,cy,a:1.57,life:3},
  {cx,cy,a:3.14,life:3},
  {cx,cy,a:4.71,life:3}
 ];
}

setInterval(()=>{if(phase==4)magProj()},1500);
setInterval(()=>{if(phase==4)magBeam()},8000);
// DRAW + COLLISIONS

// Warnings
function drawWarnings(){
 // Butter
 bw=bw.filter(w=>w.life>0);
 for(let w of bw){
  ctx.strokeStyle="red";ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
  w.life-=0.02;
 }
 // Salt aimed
 sw=sw.filter(w=>w.life>0);
 for(let w of sw){
  ctx.strokeStyle="red";ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
  w.life-=0.02;
 }
 // Fire
 fw=fw.filter(w=>w.life>0);
 for(let w of fw){
  ctx.strokeStyle="red";ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
  w.life-=0.02;
 }
 // Salt rain warning
 srw=srw.filter(w=>w.life>0);
 for(let w of srw){
  ctx.strokeStyle="yellow";ctx.lineWidth=6;
  ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,6.28);ctx.stroke();
  w.life-=0.02;
 }
}

// Bullet drawing helper
function drawBullets(arr,color){
 for(let b of arr){
  b.x+=b.vx; b.y+=b.vy;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();

  // Player hit
  if(alive && hit(b.x,b.y,b.r, player.x,player.y,player.r))
   alive=0;

  // CPU hit
  for(let c of cpus)
   if(c.alive && hit(b.x,b.y,b.r,c.x,c.y,c.r)){
    c.alive=0; dead++;
   }
 }
}

// Salt rain drops
function drawSaltRain(){
 for(let r of srd){
  r.y+=r.vy;
  ctx.fillStyle="white";
  ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,6.28);ctx.fill();

  if(alive && hit(r.x,r.y,r.r, player.x,player.y,player.r))
   alive=0;

  for(let c of cpus)
   if(c.alive && hit(r.x,r.y,r.r,c.x,c.y,c.r)){
    c.alive=0; dead++;
   }
 }
}

// Fire bars
function drawFireBars(){
 for(let f of bars){
  f.x+=f.vx; f.y+=f.vy; f.a+=0.08;
  for(let i=0;i<f.n;i++){
   if(i%4==0)continue;
   let ang=f.a+i*(6.28/f.n),
       px=f.x+Math.cos(ang)*130,
       py=f.y+Math.sin(ang)*130;
   ctx.fillStyle="orange";
   ctx.beginPath();ctx.arc(px,py,14,0,6.28);ctx.fill();

   if(alive && hit(px,py,14, player.x,player.y,player.r))
    alive=0;

   for(let c of cpus)
    if(c.alive && hit(px,py,14,c.x,c.y,c.r)){
     c.alive=0; dead++;
    }
  }
 }
}

// Magnetron beams
function drawBeams(){
 for(let b of beam){
  b.life-=0.02;
  if(b.life<=0)continue;
  b.a+=0.008;

  let cx=b.cx,cy=b.cy;
  let x2=cx+Math.cos(b.a)*2000,
      y2=cy+Math.sin(b.a)*2000;

  ctx.strokeStyle="magenta";ctx.lineWidth=20;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x2,y2);ctx.stroke();

  // Check collisions along beam line
  const steps=40;
  for(let i=0;i<steps;i++){
   let t=i/steps;
   let bx=cx+(x2-cx)*t, by=cy+(y2-cy)*t;

   if(alive && hit(bx,by,15, player.x,player.y,player.r))
    alive=0;

   for(let c of cpus)
    if(c.alive && hit(bx,by,10,c.x,c.y,c.r)){
     c.alive=0; dead++;
    }
  }
 }
}
// BOSS DRAW + PHASE TRANSITIONS

function drawBosses(){
 // Butter
 if(bossActive.butter){
  ctx.fillStyle="#ffda57";
  ctx.fillRect(W/2-50,80,100,50);
 }

 // Salt
 if(bossActive.salt){
  ctx.fillStyle="white";
  ctx.fillRect(W/2-40,120,80,100);
  ctx.fillStyle="lightgray";
  ctx.fillRect(W/2-40,120,80,20);
 }

 // Fire
 if(bossActive.fire){
  ctx.fillStyle="orange";
  ctx.beginPath();ctx.arc(W/2,140,45,0,6.28);ctx.fill();
  ctx.fillStyle="red";
  ctx.beginPath();ctx.arc(W/2,140,25,0,6.28);ctx.fill();
 }

 // Magnetron
 if(bossActive.magnet){
  ctx.fillStyle="purple";
  ctx.beginPath();ctx.arc(W/2,140,45,0,6.28);ctx.fill();
  ctx.fillStyle="magenta";
  ctx.beginPath();ctx.arc(W/2,140,28,0,6.28);ctx.fill();
 }
}


// PHASE CONTROL (with instant boss despawn + attack clearing)
function phaseControl(){
 // Phase 1 → Phase 2 (Butter → Salt)
 if(phase==1 && dead>=15){
  phase=2;
  bossActive.butter=0;
  bossActive.salt=1;
  bossActive.fire=0;
  bossActive.magnet=0;
  clearAllAttacks();
 }

 // Phase 2 → Phase 3 (Salt → Fire)
 if(phase==2 && dead>=30){
  phase=3;
  bossActive.butter=0;
  bossActive.salt=0;
  bossActive.fire=1;
  bossActive.magnet=0;
  clearAllAttacks();
 }

 // Phase 3 → Phase 4 (Fire → Magnetron)
 if(phase==3 && dead>=45){
  phase=4;
  bossActive.butter=0;
  bossActive.salt=0;
  bossActive.fire=0;
  bossActive.magnet=1;
  clearAllAttacks();
 }
}
// FINAL GAME LOOP

function loop(){
 // Arena color
 ctx.clearRect(0,0,W,H);
 ctx.fillStyle=
  phase==1?"#222":
  phase==2?"#023":
  phase==3?"#501":
            "#203";
 ctx.fillRect(0,0,W,H);

 // Player movement
 movePlayer();

 // CPUs
 for(let c of cpus){c.update();c.draw();}

 // Player
 if(alive){
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,6.28);
  ctx.fill();
 }

 // Boss
 drawBosses();

 // Attacks
 drawWarnings();
 drawBullets(bb,"orange");
 drawBullets(sb,"#6cf");
 drawBullets(fb,"orange");
 drawBullets(mb,"magenta");
 drawSaltRain();
 drawFireBars();
 drawBeams();

 // Phase transitions
 phaseControl();

 // WIN SCREEN
 if(phase==4 && dead>=60){
  ctx.fillStyle="white";
  ctx.font="70px sans-serif";
  ctx.fillText("YOU WIN!",W/2-180,H/2);
  return;
 }

 requestAnimationFrame(loop);
}

loop();
</script></body></html>

 constructor(){

 }

  if(d<80){ ax+=dx/d*speed; ay+=dy/d*speed; }

  if(d<180){ ax+=dx/d*speed; ay+=dy/d*speed; }

  // --- Helper to avoid bullets ---
  const self=this;
  function avoid(list){
   for(const b of list){
    let dx=self.x-b.x, dy=self.y-b.y;

    if(d<140){
     ax+=(dx/d)*speed*1.4;
     ay+=(dy/d)*speed*1.4;
    }
   }
  }

  // 3. Avoid bullets
  avoid(bb); avoid(sb); avoid(fb); avoid(mb);

  // 4. Avoid salt rain
  for(const r of srd){
   let dx=this.x-r.x, dy=this.y-r.y;
   let d=Math.hypot(dx,dy);
   if(d<120){
    ax+=(dx/d)*speed*1.3;
    ay+=(dy/d)*speed*1.3;
   }
  }

  // 5. Avoid firebars
  for(const f of bars){
   for(let i=0;i<f.n;i++){
    if(i%4==0)continue;
    let a=f.a+i*(6.28/f.n);
    let px=f.x+Math.cos(a)*130;
    let py=f.y+Math.sin(a)*130;
    dx=this.x-px; dy=this.y-py;
    d=Math.hypot(dx,dy);
    if(d<160){
     ax+=(dx/d)*speed*1.6;
     ay+=(dy/d)*speed*1.6;
    }
   }
  }

  // 6. Avoid beams
  for(const b of beam){
   if(b.life<=0)continue;
   for(let t=0;t<=1;t+=0.1){
    let px=b.cx+Math.cos(b.a)*2000*t;
    let py=b.cy+Math.sin(b.a)*2000*t;
    dx=this.x-px; dy=this.y-py;
    d=Math.hypot(dx,dy);
    if(d<180){
     ax+=(dx/d)*speed*1.2;
     ay+=(dy/d)*speed*1.2;
    }
   }
  }

  // 7. Avoid other CPUs
  for(const c of cpus){
   if(c===this||!c.alive)continue;
   dx=this.x-c.x; dy=this.y-c.y;
   d=Math.hypot(dx,dy);
   if(d<40){
    ax+=(dx/d)*speed*1.5;
    ay+=(dy/d)*speed*1.5;
   }
  }

  // Apply acceleration
  this.vx+=ax;
  this.vy+=ay;

  // Clamp speed
  let v=Math.hypot(this.vx,this.vy);
  if(v>maxSpeed){
   this.vx=this.vx/v*maxSpeed;
   this.vy=this.vy/v*maxSpeed;
  }

  // Move
  this.x+=this.vx;
  this.y+=this.vy;

  // Bounds
  if(this.x<this.r){this.x=this.r;this.vx*=-0.5;}
  if(this.x>W-this.r){this.x=W-this.r;this.vx*=-0.5;}
  if(this.y<this.r){this.y=this.r;this.vy*=-0.5;}
  if(this.y>H-this.r){this.y=H-this.r;this.vy*=-0.5;}
 }

  ctx.beginPath();
  ctx.arc(this.x,this.y,this.r,0,6.28);
  ctx.fill();
 }
};

// reinitialize CPUs with smart AI

<script>
// Create UI containers
let ui = document.createElement("div");
ui.id = "uiLayer";
ui.style.position = "absolute";
ui.style.left = "0";
ui.style.top = "0";
ui.style.width = "100%";
ui.style.height = "100%";
ui.style.display = "flex";
ui.style.flexDirection = "column";
ui.style.alignItems = "center";
ui.style.justifyContent = "center";
ui.style.color = "white";
ui.style.fontFamily = "Arial";
ui.style.fontSize = "48px";
ui.style.textAlign = "center";
ui.style.userSelect = "none";
document.body.appendChild(ui);

let titleScreen = document.createElement("div");
titleScreen.innerHTML = `
  <div style="font-size:70px; margin-bottom:40px;">POPCORN BOSS RUSH</div>
  <button id="startBtn" style="font-size:40px;padding:20px 50px;margin:20px;">START GAME</button>
  <button id="leagueBtn" style="font-size:40px;padding:20px 50px;margin:20px;">LEAGUE</button>
`;
ui.appendChild(titleScreen);

// Hide canvas until game starts
c.style.display = "none";

// Global state
let gameState = "title"; // title, running, league, result

// Start Game button
document.getElementById("startBtn").onclick = () => {
  gameState = "running";
  ui.style.display = "none";
  c.style.display = "block";
  resetRun();
};

// Switch to LEAGUE screen
document.getElementById("leagueBtn").onclick = () => {
  gameState = "league";
  showLeagueScreen();
};

// Reset game values when starting a run
function resetRun(){
  phase = 1;
  dead = 0;
  alive = 1;
  bossActive.butter=1;
  bossActive.salt=0;
  bossActive.fire=0;
  bossActive.magnet=0;

  // restore CPUs
  cpus = [...Array(60)].map(_=>new CPU());

  // clear attacks
  clearAllAttacks();

  // restart animation loop after short delay
  setTimeout(()=>loop(),50);
}

// Show result screen when run ends
function showResultScreen(text){
  gameState = "result";
  c.style.display = "none";

  ui.innerHTML = `
    <div style="font-size:70px;margin-bottom:40px;">${text}</div>
    <button id="backToMenu" style="font-size:40px;padding:20px 50px;margin:20px;">Back to Menu</button>
  `;
  ui.style.display = "flex";

  document.getElementById("backToMenu").onclick = () => {
    gameState = "title";
    ui.innerHTML = "";
    ui.appendChild(titleScreen);
  };
}
</script>

const leagueTiers = [
  {name:"Bronze",    min:750, max:1000},
  {name:"Silver",    min:500, max:749},
  {name:"Gold",      min:300, max:499},
  {name:"Diamond",   min:150, max:299},
  {name:"Platinum",  min:50,  max:149},
  {name:"Plaque",    min:25,  max:49},
  {name:"Champions", min:11,  max:24},
  {name:"Hall of Masters", min:1, max:10}
];

// ===============================
// LOAD OR INIT PLAYER
// ===============================
let playerPoints = parseInt(localStorage.getItem("playerPoints"));
if(isNaN(playerPoints)){
  playerPoints = 500; // start in Silver middle
  localStorage.setItem("playerPoints",playerPoints);
}

// ===============================
// LOAD OR GENERATE 1000 BOTS
// ===============================
let bots = JSON.parse(localStorage.getItem("popcornBots"));

if(!bots){
  bots = [];
  for(let i=0;i<1000;i++){
    // generate random rank from 1–1000
    let pts = Math.floor(Math.random()*1000)+1;

    bots.push({
      name:"Bot "+(i+1),
      points: pts,
      skill: (1000-pts)/1000   // skill scales with points
    });
  }
  localStorage.setItem("popcornBots",JSON.stringify(bots));
}

// ===============================
// SAVE HELPERS
// ===============================
function savePlayerPoints(){
  localStorage.setItem("playerPoints",playerPoints);
}
function saveBots(){
  localStorage.setItem("popcornBots",JSON.stringify(bots));
}

// ===============================
// SORT + RANK CALCULATION
// ===============================
function sortBots(){
  bots.sort((a,b)=>b.points - a.points);
}

function findPlayerRank(){
  // treat player as bot #1001 for ranking
  let combined = [...bots, {name:"You",points:playerPoints}];
  combined.sort((a,b)=>b.points - a.points);

  return combined.findIndex(x=>x.name==="You")+1;
}

// Determine your league by point range
function getPlayerLeague(){
  for(const tier of leagueTiers){
    if(playerPoints >= tier.min && playerPoints <= tier.max){
      return tier.name;
    }
  }
  return "Unranked";
}

// ===============================
// GET BOTS IN YOUR LEAGUE
// ===============================
function getBotsInLeague(){
  let league = getPlayerLeague();
  let tier = leagueTiers.find(t=>t.name===league);
  if(!tier) return [];

  return bots.filter(b=>b.points >= tier.min && b.points <= tier.max);
}

}

<script>
// Award points based on run performance
function awardPoints(){

  let gained = 0;

  // Determine what phase you reached
  if(phase == 4 && alive){ 
    // FULL CLEAR = +100
    gained = 100;
  }
  else if(phase == 4){ 
    // Died in magnetron = +75
    gained = 75;
  }
  else if(phase == 3 || phase == 2){
    // Reached salt or fire = +50
    gained = 50;
  }
  else if(phase == 1){
    // Died to butter = -25
    gained = -25;
  }

  // Apply point changes to YOU
  playerPoints += gained;
  if(playerPoints < 1) playerPoints = 1;

  // Apply opposite effect to the opponent
  if(currentOpponent){
    let oppGain = -gained;
    currentOpponent.points += oppGain;
    if(currentOpponent.points < 1) 
      currentOpponent.points = 1;
  }

  savePlayerPoints();
  saveBots();

  console.log(
    "RESULT:", (gained>=0?"+":"") + gained, 
    "points | Player now:", playerPoints,
    "| Opponent:", currentOpponent ? currentOpponent.name : "none"
  );

  // Display result screen
  let text = gained >= 0 
    ? ("You earned " + gained + " points!") 
    : ("You lost " + Math.abs(gained) + " points!");

  showResultScreen(text);
}

// Hook run ending to awardPoints()
// We detect run end inside the loop()
// So we override loop() detection behavior

const oldLoop = loop;
loop = function(){
  // If run is active and player died or reached win condition, award points
  if(gameState=="running"){
    if(!alive){
      // died
      awardPoints();
      return;
    }
    if(phase==4 && dead >= 60){
      // win
      awardPoints();
      return;
    }
  }
  oldLoop();
};
</script>

<script>

// Override CPU update to scale with difficulty without replacing logic

CPU.prototype.update = function(){
 if(!this.alive) return;

 // Scale factors based on bot difficulty
 // botDifficulty range: ~0.2 (Bronze) → ~1.5 (Masters)
 let diff = window.botDifficulty || 1;

 // Apply global multipliers readable by old logic
 // We keep these mild to avoid immortality or instant death.

 window.CPU_REACT = 0.15 * diff;      // baseline: react slower in Bronze, faster in Masters
 window.CPU_PANIC = 0.10 * diff;      // panic harder in higher leagues
 window.CPU_MAXSPEED = 2.0 + diff*0.8; // Bronze ~2.16, Masters ~3.2
 window.CPU_DODGE_RADIUS = 120 + diff*60; // Bronze ~132px, Masters ~210px

 // Let original logic run with modified globals
 oldCPUUpdate.call(this);
};

// MODIFY THE AI FUNCTIONS USED IN OLD PATCH SO THEY READ NEW GLOBALS
// (These values are read dynamically each update)
CPU.prototype.getReact = () => window.CPU_REACT || 0.15;

CPU.prototype.getMaxSpeed = () => window.CPU_MAXSPEED || 2.4;
CPU.prototype.getDodgeRadius = () => window.CPU_DODGE_RADIUS || 140;

// Reinitialize CPUs after difficulty scaling is installed
cpus = [...Array(60)].map(_=>new CPU());

<!-- PATCH F — EVENT BOSS #1: INFERNO RING -->
<script>
// ======================================================
// EVENT BOSS #1 — INFERNO RING
// ======================================================

// Boss properties
let inferno = {
  x: W/2,
  y: H/2 - 150,
  r: 80,
  borderShrink: 0,
  pullActive: false,
  pullTimer: 0,
  fireCooldown: 0,
  arenaBorder: 0,
  hp: 300, // you can change later
  maxHP: 300
};

// Reset inferno boss
function resetInferno(){
  inferno.x = W/2;
  inferno.y = H/2 - 150;
  inferno.r = 80;
  inferno.borderShrink = 0;
  inferno.pullActive = false;
  inferno.pullTimer = 0;
  inferno.fireCooldown = 0;
  inferno.arenaBorder = 0;
  inferno.hp = inferno.maxHP;
}

// Fireball list
let infernoBalls = [];
let infernoWarnings = [];

// Shoot semi-homing fireballs
function infernoShoot(){
  let angle = Math.random()*Math.PI*2;
  let speed = 2.2;

  // aim slightly toward player
  let dx = player.x - inferno.x;
  let dy = player.y - inferno.y;
  let aim = Math.atan2(dy,dx);

  // random offset
  let blend = 0.4; // 40% toward target, 60% random
  let finalA = aim*blend + angle*(1-blend);

  infernoBalls.push({
    x: inferno.x,
    y: inferno.y,
    vx: Math.cos(finalA)*speed,
    vy: Math.sin(finalA)*speed,
    r: 12
  });
}

// Draw arena border closing in
function drawInfernoBorder(){
  inferno.arenaBorder += 0.04; // slowly closes in

  let b = inferno.arenaBorder;

  ctx.strokeStyle = "#ff3000";
  ctx.lineWidth = 15;
  ctx.strokeRect(b, b, W - b*2, H - b*2);

  // Kill if outside border
  if(alive){
    if(player.x < b || player.x > W - b || player.y < b || player.y > H - b){
      alive = 0;
    }
  }

  for(let c of cpus){
    if(c.alive){
      if(c.x < b || c.x > W - b || c.y < b || c.y > H - b){
        c.alive = 0;
        dead++;
      }
    }
  }
}

// Gravity pull ultimate
function infernoPullUltimate(){
  inferno.pullActive = true;
  inferno.pullTimer = 180; // 3 seconds at 60FPS
}

// CPU dash-away logic
function cpuRunFromInferno(c){
  let dx = c.x - inferno.x;
  let dy = c.y - inferno.y;
  let d = Math.hypot(dx,dy);

  if(d < 300){ // panic zone
    c.vx += (dx/d)*0.8;
    c.vy += (dy/d)*0.8;
  }
}

// Player pull handling
function playerPulled(){
  let dx = inferno.x - player.x;
  let dy = inferno.y - player.y;
  let d = Math.hypot(dx,dy);

  player.x += dx/d * 1.3;
  player.y += dy/d * 1.3;
}

// CPU pulled
function cpuPulled(c){
  let dx = inferno.x - c.x;
  let dy = inferno.y - c.y;
  let d = Math.hypot(dx,dy);

  c.x += dx/d * 1.2;
  c.y += dy/d * 1.2;
}

// Render boss
function drawInfernoBoss(){
  ctx.fillStyle = "#ff5a00";
  ctx.beginPath();
  ctx.arc(inferno.x, inferno.y, inferno.r, 0, Math.PI*2);
  ctx.fill();

  // HP bar
  ctx.fillStyle="black";
  ctx.fillRect(W/2-150,50,300,20);
  ctx.fillStyle="#f33";
  ctx.fillRect(W/2-150,50,(inferno.hp/inferno.maxHP)*300,20);
}


// ======================================================
// EVENT LOOP — REPLACES MAIN LOOP DURING EVENT
// ======================================================
function eventLoop(){
  if(gameState !== "event") return;

  // Arena
  ctx.fillStyle = "#300"; // dark red
  ctx.fillRect(0,0,W,H);

  drawInfernoBorder();
  drawInfernoBoss();

  // Fireball shooting
  inferno.fireCooldown--;
  if(inferno.fireCooldown <= 0){
    infernoShoot();
    inferno.fireCooldown = 20; // shoots every 20 frames
  }

  // Update fireballs
  for(let b of infernoBalls){
    b.x += b.vx;
    b.y += b.vy;

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();

    // collision
    if(alive && Math.hypot(b.x-player.x,b.y-player.y) < b.r+player.r){
      alive = 0;
    }

    for(let c of cpus){
      if(c.alive && Math.hypot(b.x-c.x,b.y-c.y) < b.r+c.r){
        c.alive = 0;
        dead++;
      }
    }
  }

  // Pull Ultimate trigger
  if(Math.random()<0.002 && !inferno.pullActive){
    infernoPullUltimate();
  }

  // Pull Active
  if(inferno.pullActive){
    inferno.pullTimer--;

    // Red tint
    ctx.fillStyle = "rgba(255,0,0,0.2)";
    ctx.fillRect(0,0,W,H);

    // Pull logic
    if(alive) playerPulled();
    for(let c of cpus) if(c.alive) cpuPulled(c);

    // CPUs dash away if close
    for(let c of cpus) if(c.alive) cpuRunFromInferno(c);

    if(inferno.pullTimer <= 0){
      inferno.pullActive = false;
    }
  }

  // Player & CPU draw
  if(alive){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();
  }
  for(let c of cpus){
    if(c.alive){
      ctx.fillStyle="#4bf";
      ctx.beginPath();
      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Boss damage (only from survival)
  inferno.hp -= 0.05; // slow chip damage over time

  // Win condition
  if(inferno.hp <= 0){
    eventWin();
    return;
  }

  // Lose condition
  if(!alive){
    eventLoss();
    return;
  }

  requestAnimationFrame(eventLoop);
}


// ======================================================
// EVENT WIN/LOSS HANDLERS
// ======================================================
function eventWin(){
  // +200 points
  let gained = 200;
  playerPoints += gained;
  savePlayerPoints();

  // rotate to next boss
  rotateEventBoss();

  showResultScreen("EVENT CLEARED! +200 points");
}

function eventLoss(){
  // -50 points
  let gained = -50;
  playerPoints += gained;
  savePlayerPoints();

  rotateEventBoss();

  showResultScreen("EVENT FAILED! -50 points");
}


// ======================================================
// HOOK INTO startEventBattle()
// ======================================================
const oldStartEvent = startEventBattle;
startEventBattle = function(){
  resetInferno();
  infernoBalls = [];

  oldStartEvent();
};

</script>

        x:t.x,
        y:t.y,
        r:40
      });
    }
  }
}

// CPUs panic when ultimate is active
function cpuAvoidConveyor(c){
  if(!conveyor.ultActive) return;

  // Random zigzag panic
  c.vx += (Math.random()*2-1)*0.6;
  c.vy += (Math.random()*2-1)*0.6;
}


// ======================================================
// EVENT LOOP FOR CONVEYER-BELT
// ======================================================
function conveyorLoop(){
  if(gameState!=="event" || currentEventBoss!=="Conveyer-Belt") return;

  // Arena
  ctx.fillStyle="#001922"; // neon cyan style background
  ctx.fillRect(0,0,W,H);

  drawConveyorBoss();

  // Attack pacing
  conveyor.safeTimer++;
  conveyor.attackSpeed = Math.max(10, 60 - Math.floor(conveyor.safeTimer/60));

  conveyor.attackTimer++;
  if(conveyor.attackTimer >= conveyor.attackSpeed){
    conveyorSpawnCircle();
    conveyor.attackTimer = 0;
  }

  // Randomly trigger ultimate
  if(!conveyor.ultActive && Math.random() < 0.0025){
    conveyorUltimate();
  }

  updateConveyorUltimate();

  // Draw kill circles + collisions
  for(let k of conveyorCircles){
    ctx.fillStyle = "#00aaff";
    ctx.beginPath();
    ctx.arc(k.x,k.y,k.r,0,Math.PI*2);
    ctx.fill();

    if(alive && Math.hypot(player.x-k.x, player.y-k.y) < player.r + k.r){
      alive = 0;
    }

    for(let c of cpus){
      if(c.alive && Math.hypot(c.x-k.x, c.y-k.y) < c.r + k.r){
        c.alive = 0;
        dead++;
        conveyor.safeTimer = 0; // death resets difficulty timer
      }
    }
  }

  // Player
  if(alive){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();
  }

  // CPUs
  for(let c of cpus){
    if(c.alive){
      cpuAvoidConveyor(c);
      ctx.fillStyle="#4bf";
      ctx.beginPath();
      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Chip boss HP slowly
  conveyor.hp -= 0.04;

  // Win condition
  if(conveyor.hp <= 0){
    eventWin();
    return;
  }

  // Lose condition
  if(!alive){
    eventLoss();
    return;
  }

  requestAnimationFrame(conveyorLoop);
}

<script>
// ======================================================
// EVENT BOSS #3 — BLACK PEPPER
// ======================================================

let pepper = {
  hp: 400,
  maxHP: 400,
  x: W/2,
  y: H/2 - 150,
  w: 120,
  h: 200,
  angle: 0,
  spinSpeed: 0.01,
  missileCooldown: 0,
  spikeCooldown: 0,
  ultActive: false,
  ultTimer: 0,
  safeSpots: []
};

let pepperMissiles = [];
let pepperSpikes = [];

function resetPepper(){
  pepper.hp = pepper.maxHP;
  pepper.angle = 0;
  pepper.missileCooldown = 0;
  pepper.spikeCooldown = 0;
  pepper.ultActive = false;
  pepper.ultTimer = 0;
  pepper.safeSpots = [];

  pepperMissiles = [];
  pepperSpikes = [];
}

// Draw spinning yin-yang background
function drawPepperArena(){
  pepper.angle += pepper.spinSpeed;

  // gradient background
  let g = ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W*0.8);
  g.addColorStop(0,"#000");
  g.addColorStop(1,"#111");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.rotate(pepper.angle);

  // Yin
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(0,0,300,Math.PI*0.5,Math.PI*1.5);
  ctx.arc(0,-150,150,Math.PI*1.5,Math.PI*0.5,true);
  ctx.fill();

  // Yang
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(0,0,300,Math.PI*1.5,Math.PI*0.5);
  ctx.arc(0,150,150,Math.PI*0.5,Math.PI*1.5,true);
  ctx.fill();

  // dots
  ctx.fillStyle="black";
  ctx.beginPath(); ctx.arc(0,-150,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="white";
  ctx.beginPath(); ctx.arc(0,150,30,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// Draw boss
function drawPepperBoss(){
  ctx.save();
  ctx.translate(pepper.x, pepper.y);
  ctx.fillStyle="white";
  ctx.fillRect(-pepper.w/2, -pepper.h/2, pepper.w, pepper.h);
  ctx.fillStyle="black";
  ctx.fillRect(-pepper.w/4, -pepper.h/2, pepper.w/2, pepper.h/2);
  ctx.restore();

  // HP bar
  ctx.fillStyle="black";
  ctx.fillRect(W/2-150,50,300,20);
  ctx.fillStyle="#aaa";
  ctx.fillRect(W/2-150,50,(pepper.hp/pepper.maxHP)*300,20);
}

// Shoot slow missiles in all directions
function pepperShootMissiles(){
  for(let i=0;i<6;i++){
    let a = Math.PI*2 * (i/6) + Math.random()*0.5 - 0.25;
    pepperMissiles.push({
      x: pepper.x,
      y: pepper.y,
      vx: Math.cos(a)*1.6,
      vy: Math.sin(a)*1.6,
      r: 12
    });
  }
}

// Spike eruptions
function pepperSpawnSpike(){
  pepperSpikes.push({
    x: Math.random()*W,
    y: Math.random()*H,
    r: 30,
    life: 60 // 1 second spike
  });
}

// Draw spikes
function drawPepperSpikes(){
  for(let s of pepperSpikes){
    s.life--;
    ctx.fillStyle="#444";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    // collision
    if(alive && Math.hypot(player.x-s.x,player.y-s.y) < player.r + s.r){
      alive = 0;
    }
    for(let c of cpus){
      if(c.alive && Math.hypot(c.x-s.x,c.y-s.y) < c.r + s.r){
        c.alive = 0;
        dead++;
      }
    }
  }
  pepperSpikes = pepperSpikes.filter(s=>s.life>0);
}

// Ultimate: full map pepper storm
function pepperUltimate(){
  pepper.ultActive = true;
  pepper.ultTimer = 180; // 3 seconds

  pepper.safeSpots = [];

  // choose 3 safe spots
  for(let i=0;i<3;i++){
    pepper.safeSpots.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: 50
    });
  }
}

function drawPepperUltimate(){
  if(!pepper.ultActive) return;

  pepper.ultTimer--;

  // Fill screen with pepper hazard
  ctx.fillStyle="rgba(0,0,0,0.45)";
  ctx.fillRect(0,0,W,H);

  // Draw safe zones
  ctx.fillStyle="rgba(255,255,255,0.8)";
  for(let s of pepper.safeSpots){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // Damage if not inside a safe spot
  if(alive){
    let safe = false;
    for(let s of pepper.safeSpots){
      if(Math.hypot(player.x-s.x,player.y-s.y)<player.r+s.r){
        safe = true;
        break;
      }
    }
    if(!safe){
      alive = 0;
    }
  }

  // CPUs
  for(let c of cpus){
    if(!c.alive) continue;

    let safe = false;
    for(let s of pepper.safeSpots){
      if(Math.hypot(c.x-s.x,c.y-s.y)<c.r+s.r){
        safe = true;
        break;
      }
    }
    if(!safe){
      c.alive = 0;
      dead++;
    }
  }

  if(pepper.ultTimer<=0){
    pepper.ultActive = false;
  }
}


// ======================================================
// EVENT LOOP FOR BLACK PEPPER
// ======================================================
function pepperLoop(){
  if(gameState!=="event" || currentEventBoss!=="Black Pepper") return;

  drawPepperArena();
  drawPepperBoss();

  // Missile attacks
  pepper.missileCooldown--;
  if(pepper.missileCooldown<=0){
    pepperShootMissiles();
    pepper.missileCooldown = 45;
  }

  // Spike eruptions
  pepper.spikeCooldown--;
  if(pepper.spikeCooldown<=0){
    pepperSpawnSpike();
    pepper.spikeCooldown = 50;
  }

  // Ultimate randomly triggers
  if(!pepper.ultActive && Math.random() < 0.002){
    pepperUltimate();
  }

  drawPepperSpikes();
  drawPepperUltimate();

  // Update missiles
  for(let m of pepperMissiles){
    m.x += m.vx;
    m.y += m.vy;

    ctx.fillStyle="#888";
    ctx.beginPath();
    ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
    ctx.fill();

    // collision
    if(alive && Math.hypot(m.x-player.x,m.y-player.y)<player.r+m.r){
      alive = 0;
    }
    for(let c of cpus){
      if(c.alive && Math.hypot(m.x-c.x,m.y-c.y)<c.r+m.r){
        c.alive = 0;
        dead++;
      }
    }
  }

  // Player
  if(alive){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();
  }

  // CPUs
  for(let c of cpus){
    if(c.alive){
      ctx.fillStyle="#4bf";
      ctx.beginPath();
      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Damage boss (time based)
  pepper.hp -= 0.035;

  // Win
  if(pepper.hp<=0){
    eventWin();
    return;
  }

  // Lose
  if(!alive){
    eventLoss();
    return;
  }

  requestAnimationFrame(pepperLoop);
}

    window.drawPlayer = function(){
        if(!alive) return;

        // Read equipped cosmetics
        let skin = getEquippedCosmetic("skin");
        let glow = getEquippedCosmetic("glow");
        let trail = getEquippedCosmetic("trail");

        // TRAIL EFFECT
        if(trail){
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.r + 8, 0, Math.PI*2);
            ctx.fill();
        }

        // GLOW EFFECT
        if(glow){
            ctx.shadowBlur = 25;
            ctx.shadowColor = "white";
        } else {
            ctx.shadowBlur = 0;
        }

        // SKINS
        if(skin === "Flame Circle"){
            ctx.fillStyle = "orange";
        }
        else if(skin === "Ember Core"){
            ctx.fillStyle = "red";
        }
        else if(skin === "Glitch Disk"){
            ctx.fillStyle = "#44f";
        }
        else if(skin === "Synth Sphere"){
            ctx.fillStyle = "#0ff";
        }
        else if(skin === "Blossom Circle"){
            ctx.fillStyle = "pink";
        }
        else if(skin === "Spirit Ring"){
            ctx.fillStyle = "#cc66ff";
        }
        else if(skin === "Galaxy Core"){
            ctx.fillStyle = "#6633ff";
        }
        else if(skin === "Dark Matter Ring"){
            ctx.fillStyle = "#111";
        }
        else if(skin === "Rainbow Orbit"){
            ctx.fillStyle = "#"+((1<<24)*Math.random()|0).toString(16); // rotating color
        }
        else {
            ctx.fillStyle = "red"; // default
        }

        // Draw player
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fill();

        ctx.shadowBlur = 0; // restore defaults
    };

})();
