<!DOCTYPE html>
<html>
<head>
<title>Open World Survival Game</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
// ===========================================
// FULL GAME — CHUNK 1 / 4
// CORE SYSTEMS: CANVAS, PLAYER, INPUT, CAMERA
// ===========================================

// ===== CANVAS =====
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
cvs.width = innerWidth;
cvs.height = innerHeight;

// ===== WORLD SIZE =====
const WORLD_W = 50000;
const WORLD_H = 50000;

// ===== PLAYER =====
let px = WORLD_W/2;
let py = WORLD_H/2;
let speed = 7;
let hp = 100;

// ===== CAMERA =====
let camX = 0;
let camY = 0;

// ===== INPUT =====
let keys = {};
let mouseX = 0;
let mouseY = 0;

document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>delete keys[e.key]);

// ===== BASIC WORLD BACKGROUND =====
function drawWorldBackground() {
    ctx.fillStyle = "#1a1f1a";
    ctx.fillRect(0,0,cvs.width,cvs.height);
}

// ===== PLAYER DRAW =====
function drawPlayer() {
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(cvs.width/2, cvs.height/2, 20, 0, Math.PI*2);
    ctx.fill();
}

// ===== PLAYER MOVEMENT =====
function handleMovement() {
    if (keys["w"]) py -= speed;
    if (keys["s"]) py += speed;
    if (keys["a"]) px -= speed;
    if (keys["d"]) px += speed;

    if (px < 0) px = 0;
    if (py < 0) py = 0;
    if (px > WORLD_W) px = WORLD_W;
    if (py > WORLD_H) py = WORLD_H;

    camX = px - cvs.width/2;
    camY = py - cvs.height/2;
}

// ===== TIMER =====
let startTime = performance.now();
function drawTimer() {
    let sec = Math.floor((performance.now() - startTime) / 1000);

    let m = Math.floor(sec / 60);
    let s = sec % 60;

    ctx.fillStyle="white";
    ctx.font="22px Arial";
    ctx.fillText("Time: "+m+":"+(s<10?"0":"")+s, 20, 60);
}

// ===== HELP PANEL =====
let showHelp = true;
document.addEventListener("keydown", e=>{
    if (e.key.toLowerCase()==="h") showHelp=!showHelp;
});

function drawHelp() {
    if (!showHelp) return;

    ctx.fillStyle="rgba(0,0,0,0.75)";
    ctx.fillRect(50,50,420,330);

    ctx.fillStyle="white";
    ctx.font="22px Arial";
    ctx.fillText("CONTROLS", 200,90);

    ctx.font="18px Arial";
    ctx.fillText("Move: WASD", 80,130);
    ctx.fillText("Shoot: Left Click", 80,160);
    ctx.fillText("Melee: Right Click", 80,190);
    ctx.fillText("Grenade: G", 80,220);
    ctx.fillText("Molotov: M", 80,250);
    ctx.fillText("Open Chests: E", 80,280);
    ctx.fillText("Open Shop: F", 80,310);
    ctx.fillText("Crafting: C", 80,340);
    ctx.fillText("Medkit: Q", 80,370);
    ctx.fillText("Toggle Help: H", 80,400);
}

// ===== PLACEHOLDER FOR NEXT CHUNKS =====
// (Do not remove. The next chunks continue right below this.)

// ===========================================
// FULL GAME — CHUNK 2 / 4
// WEAPONS, AMMO, BULLETS, MELEE, THROWABLES
// ===========================================

// =============================
// AMMO POOLS
// =============================
let ammo = {
    pistol:  { mag:15, maxMag:15, reserve:150 },
    shotgun: { mag:8,  maxMag:8,  reserve:40  },
    ar:      { mag:30, maxMag:30, reserve:300 },
    sniper:  { mag:5,  maxMag:5,  reserve:35  }
};

// =============================
// WEAPON DEFINITIONS
// =============================
let weapons = {
    pistol:  { type:"gun", dmg:30, rof:250, ammo:"pistol",  icon:"Pistol" },
    shotgun: { type:"gun", dmg:15, rof:800, ammo:"shotgun", pellets:6, spread:0.3, icon:"Shotgun" },
    ar:      { type:"gun", dmg:12, rof:120, ammo:"ar",      icon:"AR" },
    sniper:  { type:"gun", dmg:80, rof:900, ammo:"sniper",  icon:"Sniper" },

    katana:  { type:"melee", dmg:150, cooldown:350, arc:90,  icon:"Katana" },
    sledge:  { type:"melee", dmg:300, cooldown:900, arc:120, icon:"Sledgehammer" },

    grenade: { type:"throw", cooldown:1500, icon:"Grenade" },
    molotov: { type:"throw", cooldown:2000, icon:"Molotov" }
};

// Order of selection
let weaponOrder = ["pistol","shotgun","ar","sniper","katana","sledge"];
let currentWeaponIndex = 2;
let currentWeapon = weaponOrder[currentWeaponIndex];

// =============================
// WEAPON SWITCHING
// =============================
document.addEventListener("keydown", e=>{
    if (["1","2","3","4","5","6"].includes(e.key)) {
        currentWeaponIndex = Number(e.key)-1;
        currentWeapon = weaponOrder[currentWeaponIndex];
    }
});

document.addEventListener("wheel", e=>{
    if (e.deltaY > 0) currentWeaponIndex++;
    else currentWeaponIndex--;

    if (currentWeaponIndex < 0) currentWeaponIndex = weaponOrder.length-1;
    if (currentWeaponIndex >= weaponOrder.length) currentWeaponIndex = 0;

    currentWeapon = weaponOrder[currentWeaponIndex];
});

// =============================
// BULLETS
// =============================
let bullets = [];

function spawnBullet(angle, speed, dmg) {
    bullets.push({
        x: px,
        y: py,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        dmg: dmg
    });
}

function updateBullets() {
    ctx.fillStyle = "yellow";

    bullets.forEach((b,i)=>{
        b.x += b.dx;
        b.y += b.dy;

        ctx.beginPath();
        ctx.arc(b.x-camX, b.y-camY, 4, 0, Math.PI*2);
        ctx.fill();

        if (b.x<0 || b.y<0 || b.x>WORLD_W || b.y>WORLD_H)
            bullets.splice(i,1);
    });
}

// =============================
// GUN SHOOTING
// =============================
let lastShot = 0;

function shootGun(w) {
    let now = performance.now();
    if (now - lastShot < w.rof) return;
    lastShot = now;

    let pool = ammo[w.ammo];
    if (pool.mag <= 0) return;

    pool.mag--;

    let tx = mouseX + camX;
    let ty = mouseY + camY;
    let angle = Math.atan2(ty-py, tx-px);

    let pellets = w.pellets || 1;
    for (let i=0; i<pellets; i++) {
        let spread = w.spread ? (Math.random()*w.spread - w.spread/2) : 0;
        spawnBullet(angle+spread, 22, w.dmg);
    }
}

document.addEventListener("mousedown", e=>{
    if (e.button === 0) {
        let w = weapons[currentWeapon];
        if (w.type === "gun") shootGun(w);
    }
});

// =============================
// MELEE SYSTEM
// =============================
let lastMelee = 0;
let slashAnimations = [];

function meleeAttack(w) {
    let now = performance.now();
    if (now - lastMelee < w.cooldown) return;
    lastMelee = now;

    let tx = mouseX + camX;
    let ty = mouseY + camY;
    let angle = Math.atan2(ty-py, tx-px);

    slashAnimations.push({
        ang: angle,
        arc: w.arc,
        time: now
    });

    // damage applied in chunk 3 enemies/boss logic
}

document.addEventListener("mousedown", e=>{
    if (e.button === 2) {
        let w = weapons[currentWeapon];
        if (w.type === "melee") meleeAttack(w);
    }
});

// Slash animation
function drawSlashAnimations() {
    let now = performance.now();
    slashAnimations = slashAnimations.filter(s => now - s.time < 150);

    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 6;

    slashAnimations.forEach(s=>{
        let px2 = cvs.width/2;
        let py2 = cvs.height/2;
        let r = 110;

        ctx.beginPath();
        ctx.arc(
            px2, py2, r,
            s.ang - (s.arc*Math.PI/180)/2,
            s.ang + (s.arc*Math.PI/180)/2
        );
        ctx.stroke();
    });
}

// =============================
// THROWABLES — GRENADES & MOLOTOVS
// =============================
let grenades = [];
let fires = [];
let lastGrenade = 0;

document.addEventListener("keydown", e=>{
    if (e.key === "g") throwGrenade();
    if (e.key === "m") throwMolotov();
});

// Grenade throw
function throwGrenade() {
    let now = performance.now();
    if (now - lastGrenade < 1500) return;
    lastGrenade = now;

    let tx = mouseX + camX;
    let ty = mouseY + camY;
    let angle = Math.atan2(ty-py, tx-px);

    grenades.push({
        x: px,
        y: py,
        dx: Math.cos(angle)*12,
        dy: Math.sin(angle)*12,
        fuse: now
    });
}

function updateGrenades() {
    ctx.fillStyle = "gray";

    grenades.forEach((g,i)=>{
        g.x += g.dx;
        g.y += g.dy;

        ctx.beginPath();
        ctx.arc(g.x - camX, g.y - camY, 6, 0, Math.PI*2);
        ctx.fill();

        if (performance.now() - g.fuse > 2000) {
            // explosion damage handled in chunk 3 enemies/boss
            grenades.splice(i,1);
        }
    });
}

// Molotov
function throwMolotov() {
    let tx = mouseX + camX;
    let ty = mouseY + camY;
    let ang = Math.atan2(ty-py, tx-px);

    fires.push({
        x: px + Math.cos(ang)*80,
        y: py + Math.sin(ang)*80,
        start: performance.now()
    });
}

function updateFires() {
    let now = performance.now();
    fires = fires.filter(f => now - f.start < 6000);

    ctx.fillStyle = "rgba(255,100,0,0.6)";
    fires.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x-camX, f.y-camY, 80, 0, Math.PI*2);
        ctx.fill();
    });
}

// =============================
// WEAPON HUD
// =============================
function drawWeaponHUD() {
    ctx.fillStyle="white";
    ctx.font="22px Arial";
    ctx.fillText("Weapon: "+weapons[currentWeapon].icon, 20,150);

    let w = weapons[currentWeapon];
    if (w.type === "gun") {
        let a = ammo[w.ammo];
        ctx.fillText("Ammo: "+a.mag+"/"+a.reserve, 20,180);
    }
}

// ===========================================
// FULL GAME — CHUNK 3 / 4
// ENEMIES, MINIONS, PETS, CHESTS, SHOPS, CRAFTING, RESOURCES
// ===========================================

// =============================
// ENEMY SYSTEM
// =============================
let enemies = [];
let lastEnemySpawn = 0;

function spawnEnemy() {
    enemies.push({
        x: Math.random()*WORLD_W,
        y: Math.random()*WORLD_H,
        hp: 80,
        speed: 1.3
    });
}

function updateEnemies() {
    ctx.fillStyle = "red";

    enemies.forEach((e,i)=>{
        let dx = px - e.x;
        let dy = py - e.y;
        let d = Math.hypot(dx,dy);

        e.x += dx/d * e.speed;
        e.y += dy/d * e.speed;

        ctx.beginPath();
        ctx.arc(e.x-camX, e.y-camY, 18, 0, Math.PI*2);
        ctx.fill();

        if (d < 30) hp -= 0.20;

        // bullet damage
        bullets.forEach(b=>{
            if (Math.hypot(b.x-e.x, b.y-e.y) < 20) {
                e.hp -= b.dmg;
                b.x = -9999;
            }
        });

        // fire damage
        fires.forEach(f=>{
            if (Math.hypot(e.x-f.x, e.y-f.y) < 80) e.hp -= 1.2;
        });

        if (e.hp <= 0) enemies.splice(i,1);
    });
}

// =============================
// MINIONS (Basic)
let minions = [];
let lastMinionSpawn = 0;

function spawnMinion() {
    minions.push({
        x: Math.random()*WORLD_W,
        y: Math.random()*WORLD_H,
        hp: 40,
        speed: 2.0
    });
}

function updateMinions() {
    ctx.fillStyle = "#ff66ff";

    minions.forEach((m,i)=>{
        let dx = px - m.x;
        let dy = py - m.y;
        let d = Math.hypot(dx,dy);

        m.x += dx/d * m.speed;
        m.y += dy/d * m.speed;

        ctx.beginPath();
        ctx.arc(m.x-camX, m.y-camY, 14, 0, Math.PI*2);
        ctx.fill();

        if (d < 26) hp -= 0.10;

        // bullet damage
        bullets.forEach(b=>{
            if (Math.hypot(b.x-m.x, b.y-m.y) < 20) {
                m.hp -= b.dmg;
                b.x = -9999;
            }
        });

        // fire
        fires.forEach(f=>{
            if (Math.hypot(m.x-f.x, m.y-f.y) < 80) m.hp -= 1.0;
        });

        if (m.hp <= 0) minions.splice(i,1);
    });
}

// =============================
// PET SYSTEM
// =============================
let pets = [
    { x:px+40, y:py+40, hp:200, speed:3 }
];

function updatePets() {
    ctx.fillStyle="#00ff99";

    pets.forEach(p=>{
        // follow player
        p.x += (px - p.x)/20;
        p.y += (py - p.y)/20;

        ctx.beginPath();
        ctx.arc(p.x-camX, p.y-camY, 16, 0, Math.PI*2);
        ctx.fill();

        // find nearest enemy
        let target = null;
        let td = Infinity;

        enemies.concat(minions).forEach(e=>{
            let d = Math.hypot(e.x-p.x, e.y-p.y);
            if (d < td) { td = d; target = e; }
        });

        if (target && td < 200) {
            p.x += (target.x - p.x)/25;
            p.y += (target.y - p.y)/25;

            if (td < 30) target.hp -= 0.5;
        }
    });
}

// =============================
// RESOURCES
// =============================
let inventory = {wood:0,
    metal:0,
    gunpowder:0,
    medkits:0,
    coins:0
};

// =============================
// CHESTS
// =============================
let chests = [];
for (let i=0;i<500;i++){
    chests.push({
        x:Math.random()*WORLD_W,
        y:Math.random()*WORLD_H,
        opened:false
    });
}

function drawChests() {
    chests.forEach(c=>{
        ctx.fillStyle = c.opened ? "#553" : "#CC0";
        ctx.fillRect(c.x-camX-12, c.y-camY-12, 24,24);
    });
}

function tryOpenChest() {
    chests.forEach(c=>{
        if (!c.opened && Math.hypot(px-c.x, py-c.y) < 40) {
            c.opened = true;
            chestLoot();
        }
    });
}

document.addEventListener("keydown", e=>{
    if (e.key === "e") tryOpenChest();
});

function chestLoot() {
    let r = Math.random();
    if (r<0.2) inventory.wood += 5;
    else if (r<0.4) inventory.metal += 3;
    else if (r<0.6) inventory.gunpowder += 4;
    else if (r<0.8) inventory.medkits += 1;
    else inventory.coins += 5;
}

// =============================
// SHOPS
// =============================
let shops = [];
for (let i=0;i<40;i++){
    shops.push({
        x:Math.random()*WORLD_W,
        y:Math.random()*WORLD_H
    });
}

let shopOpen = false;

function drawShops() {
    ctx.fillStyle="#0ff";
    shops.forEach(s=>{
        ctx.fillRect(s.x-camX-10, s.y-camY-10, 20,20);
    });
}

document.addEventListener("keydown", e=>{
    if (e.key === "f") tryOpenShop();
});

function tryOpenShop() {
    shopOpen = false;
    shops.forEach(s=>{
        if (Math.hypot(px-s.x, py-s.y) < 50) shopOpen=true;
    });
}

function buyARAmmo() {
    if (inventory.coins >= 10) {
        inventory.coins -= 10;
        ammo.ar.reserve += 60;
    }
}

function buyMedkit() {
    if (inventory.coins >= 5) {
        inventory.coins -= 5;
        inventory.medkits++;
    }
}

function drawShopMenu() {
    if (!shopOpen) return;

    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(50,300,350,150);

    ctx.fillStyle="white";
    ctx.font="22px Arial";
    ctx.fillText("SHOP", 200,330);

    ctx.font="18px Arial";
    ctx.fillText("1: AR Ammo (10 coins)", 80,370);
    ctx.fillText("2: Medkit (5 coins)", 80,400);

    if (keys["1"]) buyARAmmo();
    if (keys["2"]) buyMedkit();
}

// =============================
// CRAFTING
// =============================
let craftingOpen = false;
document.addEventListener("keydown", e=>{
    if (e.key==="c") craftingOpen = !craftingOpen;
});

function craftAR() {
    if (inventory.gunpowder >= 5 && inventory.metal >= 2) {
        inventory.gunpowder -= 5;
        inventory.metal -= 2;
        ammo.ar.reserve += 60;
    }
}

function craftMedkit() {
    if (inventory.wood >= 2 && inventory.gunpowder >= 1) {
        inventory.wood -= 2;
        inventory.gunpowder -= 1;
        inventory.medkits++;
    }
}

function drawCraftingMenu() {
    if (!craftingOpen) return;

    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(50,200,350,150);

    ctx.fillStyle="white";
    ctx.font="22px Arial";
    ctx.fillText("CRAFTING", 160,230);

    ctx.font="18px Arial";
    ctx.fillText("1: AR Ammo (5 powder + 2 metal)", 80,270);
    ctx.fillText("2: Medkit (2 wood + 1 powder)",     80,300);

    if (keys["1"]) craftAR();
    if (keys["2"]) craftMedkit();
}

// =============================
// MEDKIT (Q)
// =============================
document.addEventListener("keydown", e=>{
    if (e.key==="q" && inventory.medkits>0) {
        inventory.medkits--;
        hp = Math.min(100, hp+30);
    }
});

// =============================
// SIDEBAR
// =============================
function updateSidebar() {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(cvs.width-240, 0, 240, cvs.height);

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("RESOURCES", cvs.width-220, 40);

    ctx.font="18px Arial";
    ctx.fillText("Wood: "+inventory.wood,         cvs.width-220, 80);
    ctx.fillText("Metal: "+inventory.metal,       cvs.width-220,110);
    ctx.fillText("Powder: "+inventory.gunpowder,  cvs.width-220,140);
    ctx.fillText("Medkits:"+inventory.medkits,    cvs.width-220,170);
    ctx.fillText("Coins: "+inventory.coins,       cvs.width-220,200);
}

// ===========================================
// FULL GAME — CHUNK 4 / 4
// BOSSES, POINTER ARROW, GAME LOOP, VICTORY
// ===========================================

// =============================
// BOSS DATA
// =============================
let bosses = [
    {name:"VOID TITAN", hp:50000, max:50000, alive:false, defeated:false, x:0, y:0, type:1},
    {name:"FIRE COLOSSUS", hp:40000, max:40000, alive:false, defeated:false, x:0, y:0, type:2},
    {name:"CELESTIAL BEHEMOTH", hp:30000, max:30000, alive:false, defeated:false, x:0, y:0, type:3}
];

let bossActive = null;
let lastBossSpawn = 0;
let bossWarningTime = 0;

// =============================
// SPAWN RANDOM BOSS
// =============================
function spawnRandomBoss() {
    let alive = bosses.filter(b => !b.defeated);

    if (alive.length === 0) return;

    let b = alive[Math.floor(Math.random()*alive.length)];

    b.x = Math.random()*WORLD_W;
    b.y = Math.random()*WORLD_H;
    b.hp = b.max;
    b.alive = true;
    bossActive = b;

    bossWarningTime = performance.now();
}

// =============================
// UPDATE BOSS
// =============================
function updateBoss() {
    if (!bossActive) return;

    let b = bossActive;
    let color = "#8000ff";
    if (b.type===2) color="#ff3000";
    if (b.type===3) color="#66ccff";

    // draw body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(b.x - camX, b.y - camY, 90, 0, Math.PI*2);
    ctx.fill();

    // chase logic
    let dx = px - b.x;
    let dy = py - b.y;
    let d = Math.hypot(dx, dy);

    // regen if far away
    if (d > 800) {
        b.hp = b.max;
        return;
    }

    // move toward player
    b.x += dx/d * 0.6;
    b.y += dy/d * 0.6;

    if (d < 120) hp -= 0.7;

    // bullets damage
    bullets.forEach(bb=>{
        if (Math.hypot(bb.x-b.x, bb.y-b.y) < 110) {
            b.hp -= bb.dmg;
            bb.x = -9999;
        }
    });

    // fire damage
    fires.forEach(f=>{
        if (Math.hypot(b.x - f.x, b.y - f.y) < 80)
            b.hp -= 1.2;
    });

    // MINION SUMMON (boss ability)
    if (Math.random() < 0.003) {
        for (let i=0;i<4;i++){
            minions.push({
                x: b.x + (Math.random()*200-100),
                y: b.y + (Math.random()*200-100),
                hp: 50,
                speed: 2.0
            });
        }
    }

    // death
    if (b.hp <= 0) {
        b.alive = false;
        b.defeated = true;
        bossActive = null;

        if (bosses.every(bb => bb.defeated))
            victory = true;
    }
}

// =============================
// BOSS WARNING FLASH
// =============================
function drawBossWarning() {
    if (!bossActive) return;
    if (performance.now() - bossWarningTime > 4000) return;

    ctx.fillStyle = "rgba(255,0,0,0.25)";
    ctx.fillRect(0,0,cvs.width,cvs.height);

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("WARNING! BOSS APPROACHING!", 200,200);
}

// =============================
// BOSS HP BAR
// =============================
function drawBossHP() {
    if (!bossActive) return;

    let b = bossActive;
    let pct = b.hp / b.max;

    ctx.fillStyle="black";
    ctx.fillRect(50,20,550,30);

    ctx.fillStyle="red";
    ctx.fillRect(50,20,550*pct,30);

    ctx.strokeStyle="white";
    ctx.strokeRect(50,20,550,30);

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText(b.name, 50, 16);
}

// =============================
// BOSS ARROW POINTER
// Points toward boss if out of screen
// =============================
function drawBossArrow() {
    if (!bossActive) return;

    let b = bossActive;
    let bx = b.x - camX;
    let by = b.y - camY;

    // If boss is on screen → no arrow
    if (bx > 0 && bx < cvs.width && by > 0 && by < cvs.height)
        return;

    // Direction from screen center
    let angle = Math.atan2(by - cvs.height/2, bx - cvs.width/2);

    // Arrow position (on edge of screen)
    let ax = cvs.width/2 + Math.cos(angle)*250;
    let ay = cvs.height/2 + Math.sin(angle)*250;

    // Draw arrow
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(angle+0.4)*30, ay - Math.sin(angle+0.4)*30);
    ctx.lineTo(ax - Math.cos(angle-0.4)*30, ay - Math.sin(angle-0.4)*30);
    ctx.closePath();
    ctx.fill();
}

// =============================
// GAME WIN + GAME OVER
// =============================
let victory = false;

function drawVictory() {
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.fillRect(0,0,cvs.width,cvs.height);

    ctx.fillStyle="black";
    ctx.font="90px Arial";
    ctx.fillText("YOU WIN!", cvs.width/2-200, cvs.height/2);
}

function drawGameOver() {
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,cvs.width,cvs.height);

    ctx.fillStyle="white";
    ctx.font="70px Arial";
    ctx.fillText("GAME OVER", cvs.width/2-150, cvs.height/2);
}

// =============================
// MAIN GAME LOOP
    // =============================
    let lastTime = performance.now();
    function gameLoop(currentTime) {
        if (victory) { drawVictory(); return; }
        if (hp <= 0) { drawGameOver(); return; }

        // Calculate Delta Time (in seconds)
        // If it's the first frame, dt will be 0
        const dt = (currentTime - lastTime) / 1000;
        lastTime = currentTime;

        // Prevent "spiral of death" if the tab loses focus
        // Limits dt to roughly 1/10th of a second
        const cappedDt = Math.min(dt, 0.1);

        drawWorldBackground();

        // Pass cappedDt to every function that moves objects
        handleMovement(cappedDt);

        drawChests();
        drawShops();

        updateBullets(cappedDt);
        drawSlashAnimations();
        updateGrenades(cappedDt);
        updateFires(cappedDt);

        // Spawning logic already uses performance.now(), so it's mostly fine
        if (performance.now() - lastEnemySpawn > 1000) {
            spawnEnemy();
            lastEnemySpawn = performance.now();
        }
        updateEnemies(cappedDt);

        updateMinions(cappedDt);
        updatePets(cappedDt);

        if (performance.now() - lastBossSpawn > 300000) {
            spawnRandomBoss();
            lastBossSpawn = performance.now();
        }

        updateBoss(cappedDt);

        // Drawing functions usually don't need dt unless they animate
        drawBossWarning();
        drawBossHP();
        drawBossArrow();
        drawPlayer();

        // UI/HUD
        drawWeaponHUD();
        updateSidebar();
        drawCraftingMenu();
        drawShopMenu();
        drawHelp();
        drawTimer();

        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.fillText("HP: " + Math.floor(hp), 20, 120);

        requestAnimationFrame(gameLoop);
    }

    // Start the loop
    requestAnimationFrame(gameLoop);

</script>
