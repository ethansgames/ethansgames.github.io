<!DOCTYPE html><html><head><meta charset='utf-8'><title>Deep Transit: Wilderness Dense</title><style>
html,body{margin:0;overflow:hidden;background:#02060b;color:white;font-family:Arial,Helvetica,sans-serif}#hud{position:fixed;left:0;top:0;padding:12px 16px;background:rgba(0,0,0,.55);border:1px solid rgba(120,180,220,.35);border-radius:0 0 14px 0;font-weight:800;font-size:18px;line-height:1.35;z-index:5}#msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 24px;background:rgba(0,0,0,.72);border:1px solid #6e8faa;border-radius:10px;font-size:18px;z-index:5}.cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;color:#dff6ff;text-shadow:0 0 12px #bdf;z-index:4}#start{position:fixed;inset:0;background:linear-gradient(#050b12,#000);display:flex;align-items:center;justify-content:center;z-index:10}.panel{text-align:center;max-width:850px;border:1px solid #314456;border-radius:20px;padding:35px;background:rgba(8,13,22,.92)}button{font-size:28px;font-weight:900;padding:18px 55px;border:0;border-radius:16px;cursor:pointer}b{color:#8fffb5}</style></head><body><div id='start'><div class='panel'><h1>DEEP TRANSIT: WILDERNESS</h1><h2>Actual Dense Forest Build</h2><p>Night rain, thick trees, abandoned houses, trails, monsters, resources, and 150 wilderness doors.</p><p><b>WASD</b> move • <b>Mouse</b> look • <b>Shift</b> sprint • <b>F</b> flashlight • <b>E</b> interact</p><button id='play'>PLAY</button></div></div><div id='hud'></div><div class='cross'>+</div><div id='msg'>Follow the muddy trail. Houses may contain supplies.</div>
<script type='module'>
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
let scene,camera,renderer,yaw=0,pitch=0,keys={},vel=new THREE.Vector3(),pos=new THREE.Vector3(0,2,6),area=1,hp=100,stam=80,batt=4,flash=78,lockpicks=1,med=1,hasKey=false,flashOn=true,last=performance.now();
const objs=[],monsters=[],loot=[],doors=[]; let flashlight,beam,moon;
const hud=document.getElementById('hud'), msg=document.getElementById('msg');
function rnd(a,b){return a+Math.random()*(b-a)}
function makeMat(c){return new THREE.MeshStandardMaterial({color:c,roughness:.95,metalness:0})}
const mats={ground:makeMat(0x172018),trail:makeMat(0x3b2f25),trunk:makeMat(0x17110c),pine:makeMat(0x07170f),pine2:makeMat(0x0b2115),house:makeMat(0x1b2425),roof:makeMat(0x08090a),wood:makeMat(0x3a2d20),monster:makeMat(0x050505),eye:new THREE.MeshBasicMaterial({color:0xffdddd}),loot:new THREE.MeshStandardMaterial({color:0x66ccff,emissive:0x113344}),door:new THREE.MeshStandardMaterial({color:0x111111,emissive:0x080020})};
function addBox(x,y,z,w,h,d,mat){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,y,z);m.castShadow=m.receiveShadow=true;scene.add(m);objs.push(m);return m}
function addCone(x,y,z,r,h,mat){const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,8),mat);m.position.set(x,y,z);m.castShadow=m.receiveShadow=true;scene.add(m);return m}
function tree(x,z,s=1){addBox(x,2.2*s,z,.55*s,4.4*s,.55*s,mats.trunk);addCone(x,5.1*s,z,2.6*s,4.2*s,Math.random()<.5?mats.pine:mats.pine2);addCone(x,3.8*s,z,2.2*s,3.2*s,mats.pine); if(Math.random()<.35)addCone(x,6.5*s,z,1.8*s,3*s,mats.pine2)}
function bush(x,z){addBox(x,.45,z,rnd(1.2,2.8),rnd(.5,1.1),rnd(1.2,2.8),mats.pine2)}
function house(x,z){let g=new THREE.Group();scene.add(g); const base=new THREE.Mesh(new THREE.BoxGeometry(9,5,8),mats.house);base.position.set(x,2.5,z);g.add(base); const roof=new THREE.Mesh(new THREE.ConeGeometry(7,4,4),mats.roof);roof.position.set(x,7,z);roof.rotation.y=Math.PI/4;g.add(roof); addBox(x,1.5,z+4.05,2,3,.25,mats.wood); // doorway visually open-ish
 for(let i=0;i<2;i++){let l=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),mats.loot);l.position.set(x+rnd(-3,3),.7,z+rnd(-2,2));scene.add(l);loot.push(l)} return g}
function lantern(x,z){addBox(x,1.5,z,.25,3,.25,mats.wood); const lamp=new THREE.Mesh(new THREE.SphereGeometry(.35,12,8),new THREE.MeshBasicMaterial({color:0xffb35c}));lamp.position.set(x,3.25,z);scene.add(lamp); const light=new THREE.PointLight(0xff9d44,2.3,28,2.2);light.position.set(x,2.8,z);scene.add(light)}
function monster(x,z,type='lurker'){let g=new THREE.Group();scene.add(g);let body=addBox(0,2,0,1.2,4,1.2,mats.monster);objs.pop();g.add(body);let e1=new THREE.Mesh(new THREE.SphereGeometry(.12),mats.eye),e2=e1.clone();e1.position.set(-.25,3.5,.62);e2.position.set(.25,3.5,.62);g.add(e1,e2);g.position.set(x,0,z);g.userData={type,speed:rnd(4,9),anger:rnd(.3,1)};monsters.push(g);return g}
function door(x,z){let d=addBox(x,3,z,4,6,.4,mats.door);doors.push(d);return d}
function trailSegment(z){addBox(0,.015,z,12,.03,28,mats.trail);}
function generate(){scene=new THREE.Scene();scene.background=new THREE.Color(0x07111c);scene.fog=new THREE.FogExp2(0x07111c,.018);
 camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,900);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);
 const hemi=new THREE.HemisphereLight(0x4c6c88,0x081008,1.2);scene.add(hemi);moon=new THREE.DirectionalLight(0x7fa4c9,.75);moon.position.set(-50,90,30);scene.add(moon);
 flashlight=new THREE.SpotLight(0xeaf7ff,7,85,Math.PI/7,.62,1.1);camera.add(flashlight);flashlight.position.set(.2,-.15,.25);flashlight.target.position.set(0,0,-1);camera.add(flashlight.target);scene.add(camera);
 const floor=new THREE.Mesh(new THREE.PlaneGeometry(700,900),mats.ground);floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
 for(let z=-20;z>-760;z-=26)trailSegment(z);
 // ACTUAL DENSE WALLS OF TREES beside trail and in background
 for(let z=20;z>-790;z-=7){ for(let side of [-1,1]){ for(let k=0;k<7;k++){let x=side*rnd(10,85); if(Math.random()<.88) tree(x+rnd(-2,2),z+rnd(-4,4),rnd(.8,1.7)); if(Math.random()<.75)bush(side*rnd(8,55),z+rnd(-5,5)); } } }
 // extra off-path forest carpets
 for(let i=0;i<1100;i++){let z=rnd(30,-800), x=rnd(-170,170); if(Math.abs(x)<9 && Math.random()<.85) continue; tree(x,z,rnd(.65,1.8)); if(Math.random()<.55)bush(x+rnd(-3,3),z+rnd(-3,3));}
 for(let z=-55;z>-720;z-=110){house(rnd(-32,-18),z+rnd(-15,15));house(rnd(18,34),z+rnd(-15,15));lantern(rnd(-7,7),z+20);door(rnd(-2,2),z-45)}
 for(let i=0;i<34;i++) monster(rnd(-75,75),rnd(-70,-760));
 // rain as subtle blue streaks, not white blizzard
 const rainGeo=new THREE.BufferGeometry(); const arr=[]; for(let i=0;i<1700;i++){arr.push(rnd(-160,160),rnd(3,80),rnd(-800,60))} rainGeo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3)); const rain=new THREE.Points(rainGeo,new THREE.PointsMaterial({color:0x6f8fa6,size:.035,transparent:true,opacity:.55}));scene.add(rain); window.rain=rain;
}
function update(dt){let fwd=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)*-1), right=new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));let dir=new THREE.Vector3();if(keys.w)dir.add(fwd);if(keys.s)dir.sub(fwd);if(keys.d)dir.add(right);if(keys.a)dir.sub(right);if(dir.length()>0)dir.normalize();let sp=keys.shift&&stam>0?18:9;if(keys.shift&&dir.length()>0)stam=Math.max(0,stam-18*dt);else stam=Math.min(80,stam+10*dt);pos.addScaledVector(dir,sp*dt);pos.y=2;camera.position.copy(pos);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
 if(flashOn)flash=Math.max(0,flash-1.4*dt);flashlight.visible=flashOn&&flash>0;flashlight.intensity=flashlight.visible?9:0;
 monsters.forEach(m=>{let dist=m.position.distanceTo(pos); if(dist<90){let to=pos.clone().sub(m.position);to.y=0;to.normalize();m.position.addScaledVector(to,m.userData.speed*dt*(dist<18?1.4:.45));m.lookAt(pos.x,1.8,pos.z); if(dist<2.4){hp-=18*dt;msg.textContent='Something is clawing at you. RUN.'}}});
 loot.forEach((l,i)=>{if(l&&l.position.distanceTo(pos)<3){scene.remove(l);loot[i]=null;let r=Math.random();if(r<.25)batt++;else if(r<.5)lockpicks++;else if(r<.75)med++;else{hasKey=true;msg.textContent='You found a wilderness door key.'}}});
 doors.forEach(d=>{if(d.position.distanceTo(pos)<4){msg.textContent=hasKey?'Press E at the door to enter the next wilderness area.':'Door is locked. Search houses for a key.'}});
 if(window.rain){let p=window.rain.geometry.attributes.position; for(let i=1;i<p.array.length;i+=3){p.array[i]-=26*dt;if(p.array[i]<0)p.array[i]=80}p.needsUpdate=true}
 hud.innerHTML=`AREA ${area}/150<br>HP ${Math.max(0,hp|0)} | Stamina ${stam|0}<br>Flashlight ${flash|0}% | Batteries ${batt}<br>Lockpicks ${lockpicks} | Medkits ${med} | Key ${hasKey?'YES':'NO'}<br>Monsters nearby ${monsters.filter(m=>m.position.distanceTo(pos)<55).length}<br>Bosses: Seek 30 • Creaker 75 • Executer 120 • Terminus 150`;
}
function loop(t){let dt=Math.min(.05,(t-last)/1000);last=t;update(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='f')flashOn=!flashOn;if(e.key.toLowerCase()==='e'){for(const d of doors){if(d.position.distanceTo(pos)<4&&(hasKey||lockpicks>0)){area++;hasKey=false;pos.set(0,2,6);msg.textContent='You stepped through the wilderness door. Area '+area;break}}}});window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);window.addEventListener('mousemove',e=>{if(document.pointerLockElement){yaw-=e.movementX*.0025;pitch-=e.movementY*.0025;pitch=Math.max(-1.35,Math.min(1.35,pitch))}});window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
document.getElementById('play').onclick=()=>{document.getElementById('start').style.display='none';document.body.requestPointerLock();generate();requestAnimationFrame(loop)};
</script></body></html>
