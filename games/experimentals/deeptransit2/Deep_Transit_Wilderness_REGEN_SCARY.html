<!DOCTYPE html>
<html><head><meta charset='utf-8'><title>Deep Transit Wilderness</title><style>
html,body{margin:0;overflow:hidden;background:#000;font-family:monospace;color:white}#ui{position:fixed;inset:0;pointer-events:none}#hud{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.45);padding:10px;border:1px solid #40506a;border-radius:8px;font-size:14px}#msg{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:12px 18px;border-radius:8px;font-size:18px;max-width:70%;text-align:center}#cross{position:absolute;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px}#cross:before,#cross:after{content:"";position:absolute;background:#ddd}#cross:before{left:8px;top:0;width:2px;height:18px}#cross:after{top:8px;left:0;height:2px;width:18px}#start{position:fixed;inset:0;background:radial-gradient(circle,#1b2230,#020306);display:flex;align-items:center;justify-content:center;z-index:5}#panel{width:620px;max-width:90%;border:1px solid #53657c;background:rgba(0,0,0,.72);padding:28px;border-radius:14px;box-shadow:0 0 50px #000}button{background:#2c435c;color:white;border:1px solid #8aa4bf;padding:12px 22px;font-size:18px;border-radius:8px;cursor:pointer}#hurt{position:fixed;inset:0;background:rgba(160,0,0,0);pointer-events:none;transition:.1s}</style></head><body>
<div id='start'><div id='panel'><h1>DEEP TRANSIT: WILDERNESS</h1><p>150 rainy forest areas. Doors are scattered through abandoned villages. Follow trails, search houses, survive the woods.</p><p><b>WASD</b> move, <b>Mouse</b> look, <b>Shift</b> sprint, <b>F</b> flashlight, <b>E</b> interact.</p><button id='play'>Click to enter the forest</button></div></div>
<div id='ui'><div id='hud'></div><div id='cross'></div><div id='msg'>Click to lock mouse.</div></div><div id='hurt'></div>
<script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script>
<script>
let scene,camera,renderer,clock=new THREE.Clock(),yaw=0,pitch=0,keys={},area=1,hp=100,stam=100,battery=100,flashOn=true,hasKey=false,lockpicks=1,meds=0,msgT=0;
let player=new THREE.Vector3(0,1.7,0),vel=new THREE.Vector3(),objs=[],monsters=[],houses=[],door=null,lanterns=[];
const hud=document.getElementById('hud'),msg=document.getElementById('msg'),hurt=document.getElementById('hurt');
function say(t,sec=3){msg.textContent=t;msgT=sec}
function mat(c){return new THREE.MeshStandardMaterial({color:c,roughness:.9})}
function box(x,y,z,c){let m=new THREE.Mesh(new THREE.BoxGeometry(x,y,z),mat(c));m.castShadow=m.receiveShadow=true;return m}
function cyl(r,h,c,n=10){let m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,n),mat(c));m.castShadow=m.receiveShadow=true;return m}
function add(o){scene.add(o);objs.push(o);return o}
function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x070a0f);scene.fog=new THREE.Fog(0x080b10,25,120);camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,800);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0x26364a,0x050505,1.15));let moon=new THREE.DirectionalLight(0x9bb8ff,1.25);moon.position.set(-30,80,20);moon.castShadow=true;scene.add(moon);
flash=new THREE.SpotLight(0xddeeff,7,75,Math.PI/7,.55,1.2);flash.castShadow=true;scene.add(flash);scene.add(flash.target);
makeArea();animate();}
let flash;
function clearArea(){objs.forEach(o=>scene.remove(o));objs=[];monsters=[];houses=[];lanterns=[];hasKey=false;}
function makeArea(){clearArea(); player.set(0,1.7,0); yaw=0; pitch=0;
let ground=box(360,.2,360,0x151b17);ground.position.y=-.1;add(ground);
// winding trail
let pts=[];for(let i=0;i<9;i++)pts.push(new THREE.Vector3(Math.sin(i*.8)*18,0.01,-i*28));
for(let i=0;i<pts.length-1;i++){let a=pts[i],b=pts[i+1],mid=a.clone().add(b).multiplyScalar(.5);let len=a.distanceTo(b);let tr=box(11,.04,len,0x40362b);tr.position.copy(mid);tr.rotation.y=-Math.atan2(b.x-a.x,b.z-a.z);add(tr)}
// dense forest clusters but leave trail corridor
for(let i=0;i<520;i++){let x=(Math.random()-.5)*330,z=(Math.random()-.5)*330;let near=pts.some(p=>Math.hypot(x-p.x,z-p.z)<9);if(near)continue;makeTree(x,z,Math.random()<.25)}
for(let i=0;i<130;i++){let x=(Math.random()-.5)*320,z=(Math.random()-.5)*320;if(pts.some(p=>Math.hypot(x-p.x,z-p.z)<6))continue;let b=cyl(1+Math.random()*1.4,1.2+Math.random()*1.2,0x182416,7);b.position.set(x,.6,z);add(b)}
// village clusters often
for(let c=0;c<5;c++){let p=pts[1+c*1.5|0]||pts[4];let ox=(Math.random()-.5)*24,oz=(Math.random()-.5)*14;makeVillage(p.x+ox,p.z+oz,c)}
// lanterns few, along trail
for(let i=1;i<pts.length;i+=2)makeLantern(pts[i].x+5,pts[i].z);
// next door at end
let end=pts[pts.length-1];door=box(3,5,.35,0x1e2836);door.position.set(end.x,2.5,end.z-8);add(door);let frame=box(4,5.7,.5,0x111);frame.position.copy(door.position);frame.position.y=2.85;add(frame);
// key in random house
if(houses.length){let h=houses[(Math.random()*houses.length)|0];let k=cyl(.35,.12,0xffd65a,16);k.name='key';k.position.set(h.position.x,1.1,h.position.z);add(k)}
// monsters, more pressure
let count=10+Math.min(25,area/5|0);for(let i=0;i<count;i++)spawnMonster();
if(area==30)say('SEEK is in the trees. Run to the door.',5); else if(area==75)say('CREAKER shakes the forest floor.',5); else if(area==120)say('EXECUTER has entered the village.',5); else if(area==150)say('TERMINUS: the forest is alive.',6); else say('Area '+area+': Follow the muddy trail. Search houses for the key.',4)
}
function makeTree(x,z,dead){let h=8+Math.random()*14;let trunk=cyl(.35+Math.random()*.35,h,dead?0x221b18:0x2a1d13,8);trunk.position.set(x,h/2,z);add(trunk);if(dead){for(let j=0;j<2;j++){let br=box(.25,.25,4,0x1b1412);br.position.set(x,h*.65,z);br.rotation.z=Math.random()*1.2-0.6;br.rotation.y=Math.random()*6.28;add(br)}}else{for(let j=0;j<3;j++){let cone=new THREE.Mesh(new THREE.ConeGeometry(2.6-j*.45,5,9),mat(0x0d2418));cone.position.set(x,h*.55+j*2,z);cone.castShadow=cone.receiveShadow=true;add(cone)}}}
function makeHouse(x,z,i){let w=8+Math.random()*4,d=7+Math.random()*4;let floor=box(w,.2,d,0x30251e);floor.position.set(x,.1,z);add(floor);let back=box(w,3,.35,0x3a3028);back.position.set(x,1.5,z-d/2);add(back);let left=box(.35,3,d,0x3a3028);left.position.set(x-w/2,1.5,z);add(left);let right=box(.35,3,d,0x3a3028);right.position.set(x+w/2,1.5,z);add(right);let front1=box(w*.35,3,.35,0x3a3028);front1.position.set(x-w*.325,1.5,z+d/2);add(front1);let front2=box(w*.35,3,.35,0x3a3028);front2.position.set(x+w*.325,1.5,z+d/2);add(front2);let roof=box(w+1,.35,d+1,0x171313);roof.position.set(x,3.25,z);roof.rotation.z=.08;add(roof);let h={position:new THREE.Vector3(x,0,z),w,d};houses.push(h); if(Math.random()<.65){let loot=cyl(.25,.3,Math.random()<.5?0x77aaff:0xff7777,12);loot.name=Math.random()<.5?'battery':'med';loot.position.set(x+(Math.random()-.5)*3,.6,z+(Math.random()-.5)*3);add(loot)} }
function makeVillage(x,z,c){for(let i=0;i<5;i++)makeHouse(x+(i%3-1)*13+Math.random()*3,z+(i/3|0)*13+Math.random()*3,i); if(c%2==0){let ch=box(10,7,14,0x2d2b2a);ch.position.set(x+28,3.5,z);add(ch);let sp=cyl(2,7,0x161616,4);sp.position.set(x+28,10,z-2);add(sp)}}
function makeLantern(x,z){let p=cyl(.12,3,0x111,8);p.position.set(x,1.5,z);add(p);let bulb=cyl(.45,.7,0xffb35a,12);bulb.position.set(x,3.1,z);add(bulb);let l=new THREE.PointLight(0xffa55a,2.8,32,1.6);l.position.set(x,2.2,z);scene.add(l);objs.push(l);lanterns.push(l)}
function spawnMonster(){let types=['Lurker','Smiler','Hound','Widow'];let t=types[Math.random()*types.length|0];let g=t=='Hound'?new THREE.BoxGeometry(1.2,.8,2):new THREE.BoxGeometry(1,3.2,.8);let m=new THREE.Mesh(g,mat(t=='Smiler'?0x050505:t=='Hound'?0x201817:0x111318));m.position.set((Math.random()-.5)*240, t=='Hound'?.4:1.6, -40-Math.random()*150);m.userData={type:t,spd:t=='Hound'?9:3+Math.random()*2,cool:0};add(m);monsters.push(m); if(t=='Smiler'){let teeth=box(1.1,.12,.08,0xffffff);teeth.position.set(0,.45,-.45);m.add(teeth)}}
function interact(){let ray=new THREE.Raycaster();ray.setFromCamera(new THREE.Vector2(0,0),camera);let hits=ray.intersectObjects(objs,true).filter(h=>h.distance<5);if(!hits.length)return;let o=hits[0].object; if(o.name=='key'){hasKey=true;scene.remove(o);say('Village key found. Find the wilderness door.')} if(o.name=='battery'){battery=Math.min(100,battery+35);scene.remove(o);say('Battery +35')} if(o.name=='med'){meds++;scene.remove(o);say('Medkit found')} if(o==door||o.parent==door){ if(hasKey||lockpicks>0){ if(!hasKey)lockpicks--; area++; makeArea(); } else say('Locked. Search houses for a key.')}}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()=='f')flashOn=!flashOn;if(e.key.toLowerCase()=='e')interact();if(e.key.toLowerCase()=='q'&&meds>0){meds--;hp=Math.min(100,hp+35)}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
document.getElementById('play').onclick=()=>{document.getElementById('start').style.display='none';renderer.domElement.requestPointerLock();say('Mouse locked. Follow the trail.');};document.addEventListener('click',()=>{if(document.getElementById('start').style.display=='none')renderer.domElement.requestPointerLock()});document.addEventListener('mousemove',e=>{if(document.pointerLockElement===renderer.domElement){yaw-=e.movementX*.0025;pitch-=e.movementY*.0025;pitch=Math.max(-1.35,Math.min(1.35,pitch));}});
function animate(){requestAnimationFrame(animate);let dt=Math.min(.033,clock.getDelta());let forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)*-1);let right=new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));let mv=new THREE.Vector3();if(keys.w)mv.add(forward);if(keys.s)mv.sub(forward);if(keys.d)mv.add(right);if(keys.a)mv.sub(right);if(mv.length()>0)mv.normalize();let sprint=keys.shift&&stam>0;if(sprint)stam-=32*dt;else stam=Math.min(100,stam+18*dt);player.addScaledVector(mv,sprint?13*dt:7*dt);camera.position.copy(player);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
flash.visible=flashOn&&battery>0;if(flash.visible){battery-=2.2*dt;flash.position.copy(camera.position);let dir=new THREE.Vector3(0,0,-1).applyEuler(camera.rotation);flash.target.position.copy(camera.position.clone().add(dir.multiplyScalar(30)));}
// rain
if(!window.rain){let geo=new THREE.BufferGeometry(),arr=[];for(let i=0;i<900;i++){arr.push((Math.random()-.5)*160,Math.random()*50,(Math.random()-.5)*160)}geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));window.rain=new THREE.Points(geo,new THREE.PointsMaterial({color:0x9fb6c8,size:.05,transparent:true,opacity:.55}));scene.add(rain)}let pos=rain.geometry.attributes.position;for(let i=0;i<pos.count;i++){pos.array[i*3+1]-=25*dt;if(pos.array[i*3+1]<0){pos.array[i*3+1]=50;pos.array[i*3]=player.x+(Math.random()-.5)*160;pos.array[i*3+2]=player.z+(Math.random()-.5)*160}}pos.needsUpdate=true;
// monsters
monsters.forEach(m=>{let to=player.clone().sub(m.position);let dist=to.length();if(dist<85){to.y=0;to.normalize();let lightHit=flash.visible&&dist<55;let sp=m.userData.spd*(lightHit&&m.userData.type=='Lurker'?.25:1);m.position.addScaledVector(to,sp*dt);m.lookAt(player.x,m.position.y,player.z)} if(dist<2.2){hp-=28*dt;hurt.style.background='rgba(160,0,0,.28)'; if(Math.random()<.03)say(m.userData.type+' is on you!',1.2)} });hurt.style.background='rgba(160,0,0,'+Math.max(0,(100-hp)/300)+')';
hud.innerHTML=`AREA ${area}/150<br>HP ${hp|0} | STAM ${stam|0}<br>Battery ${battery|0}% | Key ${hasKey?'YES':'NO'}<br>Lockpicks ${lockpicks} | Medkits ${meds}<br>Monsters ${monsters.length}`; if(msgT>0){msgT-=dt;msg.style.display='block'}else msg.style.display='none'; if(hp<=0){say('You died in the wilderness. Refresh to retry.',99)} renderer.render(scene,camera)}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});init();
</script></body></html>
