<!DOCTYPE html><html><head><meta charset='utf-8'><title>Deep Transit: Wilderness</title><style>
html,body{margin:0;height:100%;overflow:hidden;background:#020406;color:#ddd;font-family:Arial}canvas{display:block;background:#000}#ui{position:absolute;inset:0;pointer-events:none;text-shadow:0 2px 4px #000}#top{position:absolute;top:14px;left:16px;font-weight:bold;font-size:18px}#msg{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:22px;color:#eee;text-align:center;max-width:850px}#bar{position:absolute;bottom:20px;left:20px;width:260px;height:14px;border:2px solid #bbb;background:#111}#stam{height:100%;width:100%;background:#ddd}#cross{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:28px;color:#ddd}#start{position:absolute;inset:0;background:radial-gradient(#172028,#030507);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:5;color:white;text-align:center}button{font-size:22px;padding:14px 24px;border:2px solid #aaa;background:#111;color:white;border-radius:8px;cursor:pointer}.hint{max-width:760px;line-height:1.5;color:#ccc}</style></head><body><canvas id=c></canvas><div id=ui><div id=top></div><div id=cross>+</div><div id=msg></div><div id=bar><div id=stam></div></div></div><div id=start><h1>DEEP TRANSIT: WILDERNESS</h1><p class=hint>Night. Rain. A dead village swallowed by forest. Doors stand alone between the trees. Find keys, survive the monsters, and reach Area 150.<br><br>WASD move • Mouse look • Shift sprint • E interact • F flashlight • Esc releases mouse</p><button id=play>ENTER THE RAIN</button></div><script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}onresize=resize;resize();
const TAU=Math.PI*2, CELL=4, MAP=25, FOV=Math.PI/3, RAYS=220, DEPTH=70;
let keys={},mouseLocked=false,area=1,hasKey=false,flash=true,msg='Find the key. The door is somewhere in the trees.',msgT=5,dead=false,win=false;
let p={x:8,y:8,a:0,hp:100,stam:100};let map=[],sprites=[],monsters=[],door={x:0,y:0},keyObj={x:0,y:0};let rain=[];for(let i=0;i<260;i++)rain.push({x:Math.random(),y:Math.random(),s:8+Math.random()*18});
const biomes=['Forgotten Village','Flooded Forest','Canyon Settlement','Crystal Caverns','Snowbound Hamlet','Black Pines','Terminus Grounds'];
function biome(){return area<26?0:area<51?1:area<76?2:area<101?3:area<126?4:area<150?5:6}
function rand(seed){let x=Math.sin(seed*999.77)*43758.5453;return x-Math.floor(x)}
function say(t,s=4){msg=t;msgT=s}
function cell(x,y){x=Math.floor(x);y=Math.floor(y);if(x<0||y<0||x>=MAP||y>=MAP)return 1;return map[y][x]}
function pass(x,y){let c=cell(x,y);return c===0||c===5||c===6||c===7}
function gen(){hasKey=false;dead=false;p.x=3;p.y=3;p.a=0;p.hp=100;p.stam=100;map=Array.from({length:MAP},(_,y)=>Array.from({length:MAP},(_,x)=>(x==0||y==0||x==MAP-1||y==MAP-1)?1:0));
 // winding outdoor path
 let x=3,y=3;map[y][x]=0;for(let i=0;i<100;i++){map[y][x]=0;for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++)if(map[y+yy]?.[x+xx]!==undefined)map[y+yy][x+xx]=0; if(rand(area*23+i)<.5)x+=Math.sign(MAP-4-x); else y+=Math.sign(MAP-4-y); if(rand(area*31+i)<.38){x+=Math.floor(rand(i+area)*3)-1;y+=Math.floor(rand(i+area*2)*3)-1}x=Math.max(2,Math.min(MAP-3,x));y=Math.max(2,Math.min(MAP-3,y));}
 // terrain clutter and structures
 for(let y=1;y<MAP-1;y++)for(let x=1;x<MAP-1;x++){let r=rand(area*1000+x*17+y*41); if(r<.10)map[y][x]=2; if(r>.92)map[y][x]=3;}
 // abandoned village blocks / ruins
 for(let n=0;n<5+(area%4);n++){let bx=3+Math.floor(rand(area*7+n)*17),by=4+Math.floor(rand(area*13+n)*16),bw=3+Math.floor(rand(n+7)*4),bh=3+Math.floor(rand(n+8)*3); for(let yy=0;yy<bh;yy++)for(let xx=0;xx<bw;xx++){let edge=xx==0||yy==0||xx==bw-1||yy==bh-1;if(edge&&map[by+yy]?.[bx+xx]!==undefined)map[by+yy][bx+xx]=4;} map[by+Math.floor(bh/2)][bx]=0;}
 keyObj={x:5+Math.floor(rand(area*5)*16)+.5,y:5+Math.floor(rand(area*9)*16)+.5};door={x:MAP-4+.5,y:MAP-4+.5};map[Math.floor(keyObj.y)][Math.floor(keyObj.x)]=6;map[Math.floor(door.y)][Math.floor(door.x)]=7;
 sprites=[];monsters=[];for(let i=0;i<25;i++){let sx=2+rand(area*80+i)*21,sy=2+rand(area*90+i)*21;if(pass(sx,sy))sprites.push({x:sx,y:sy,t:rand(i+area)<.5?'lamp':'grave'});} 
 let count=2+Math.floor(area/12); for(let i=0;i<count;i++){let names=['Lurker','Smiler','Hound','Widow'];let mx=6+rand(area*44+i)*16,my=6+rand(area*55+i)*16;if(pass(mx,my))monsters.push({x:mx,y:my,t:names[(i+biome())%4],hp:30,spd:.55+area*.006,cool:0});}
 if([30,75,120,150].includes(area)){let bn=area==30?'Seek':area==75?'Creaker':area==120?'Executer':'Terminus';monsters=[{x:18,y:18,t:bn,hp:200,spd:area==30?1.8:.9,cool:0,boss:true}];say('BOSS AREA: '+bn+'. Get the key and RUN.',6)} else say('Area '+area+' - '+biomes[biome()]+'. Find the key. Reach the scattered door.',4);
}
gen();
function move(dx,dy){let nx=p.x+dx,ny=p.y+dy;if(pass(nx,p.y))p.x=nx;if(pass(p.x,ny))p.y=ny}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='f')flash=!flash;if(e.key.toLowerCase()==='e')interact()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
document.getElementById('play').onclick=()=>{document.getElementById('start').style.display='none';canvas.requestPointerLock()};document.addEventListener('pointerlockchange',()=>mouseLocked=document.pointerLockElement===canvas);addEventListener('mousemove',e=>{if(mouseLocked)p.a+=e.movementX*.0025});
function interact(){let dk=Math.hypot(p.x-keyObj.x,p.y-keyObj.y),dd=Math.hypot(p.x-door.x,p.y-door.y);if(dk<1.6&&!hasKey){hasKey=true;say('You found the key. Something heard it.',4);monsters.forEach(m=>m.spd*=1.25)}else if(dd<2){if(!hasKey)say('The door is locked. Find the key.',3);else{area++; if(area>150){win=true;say('You escaped the wilderness.',99)}else gen();}}}
function update(dt){if(dead||win)return;let sp=(keys['shift']&&p.stam>0)?5.5:3.1;if(keys['shift']&&(keys.w||keys.a||keys.s||keys.d))p.stam-=35*dt;else p.stam=Math.min(100,p.stam+22*dt);let vx=0,vy=0; if(keys.w){vx+=Math.cos(p.a);vy+=Math.sin(p.a)} if(keys.s){vx-=Math.cos(p.a);vy-=Math.sin(p.a)} if(keys.a){vx+=Math.cos(p.a-Math.PI/2);vy+=Math.sin(p.a-Math.PI/2)} if(keys.d){vx+=Math.cos(p.a+Math.PI/2);vy+=Math.sin(p.a+Math.PI/2)}let l=Math.hypot(vx,vy)||1;move(vx/l*sp*dt,vy/l*sp*dt);
 monsters.forEach(m=>{let dx=p.x-m.x,dy=p.y-m.y,d=Math.hypot(dx,dy);let see=Math.abs(Math.atan2(Math.sin(Math.atan2(dy,dx)-p.a),Math.cos(Math.atan2(dy,dx)-p.a)))<.32&&flash;let speed=m.spd*(m.t==='Lurker'&&see?.15:1); if(d<18||m.boss){m.x+=dx/d*speed*dt;m.y+=dy/d*speed*dt;} if(d<1.15){p.hp-= (m.boss?28:12)*dt; if(m.cool<=0){say(m.t+' is on you!',1.5);m.cool=1}}m.cool-=dt;});
 if(p.hp<=0){dead=true;say('You died in the rain. Press R to restart this area.',99)} if(keys.r&&dead)gen(); msgT-=dt;if(msgT<=0)msg='';}
function cast(ang){let sin=Math.sin(ang),cos=Math.cos(ang);for(let d=.05;d<DEPTH;d+=.05){let x=p.x+cos*d,y=p.y+sin*d,c=cell(x,y);if(c>0&&c!==6&&c!==7)return{d,x,y,c};}return{d:DEPTH,c:0}}
function color(c,dist){let b=Math.max(25,180-dist*4);let bio=biome(); if(c==1)return`rgb(${b*.25},${b*.28},${b*.32})`; if(c==2)return`rgb(${b*.08},${b*.18},${b*.12})`; if(c==3)return bio==3?`rgb(${b*.35},${b*.55},${b*.7})`:`rgb(${b*.18},${b*.12},${b*.08})`; if(c==4)return`rgb(${b*.32},${b*.25},${b*.18})`;return '#111'}
function render(){ctx.fillStyle='#05070b';ctx.fillRect(0,0,W,H);let grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#070b12');grd.addColorStop(.55,'#101114');grd.addColorStop(1,'#050604');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);ctx.fillStyle='#050504';ctx.fillRect(0,H/2,W,H/2);
 let z=[];for(let i=0;i<RAYS;i++){let a=p.a-FOV/2+FOV*i/RAYS,hit=cast(a),dist=hit.d*Math.cos(a-p.a);z[i]=dist;let h=Math.min(H, H/(dist*.25));ctx.fillStyle=color(hit.c,dist);ctx.fillRect(i*W/RAYS,H/2-h/2,W/RAYS+1,h);if(hit.c==4){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(i*W/RAYS,H/2-h/8,W/RAYS+1,h/4)}}
 let draw=[...sprites,{...keyObj,t:'key'},{...door,t:'door'},...monsters].sort((a,b)=>Math.hypot(b.x-p.x,b.y-p.y)-Math.hypot(a.x-p.x,a.y-p.y));
 draw.forEach(s=>{let dx=s.x-p.x,dy=s.y-p.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)-p.a;ang=Math.atan2(Math.sin(ang),Math.cos(ang));if(Math.abs(ang)>FOV*.7||dist<.2)return;let sx=W/2+(ang/(FOV/2))*W/2,size=Math.min(H,H/(dist*.18));let alpha=Math.max(.15,1-dist/35);ctx.globalAlpha=alpha;if(s.t=='door'){ctx.fillStyle=hasKey?'#d8d8c8':'#3a2520';ctx.fillRect(sx-size*.18,H/2-size*.45,size*.36,size*.9);ctx.fillStyle='#111';ctx.fillRect(sx-size*.04,H/2,size*.04,size*.04)} else if(s.t=='key'){if(!hasKey){ctx.fillStyle='#e4d36a';ctx.beginPath();ctx.arc(sx,H/2,size*.08,0,TAU);ctx.fill();ctx.fillRect(sx,H/2-size*.02,size*.25,size*.04)}} else if(s.hp!==undefined){ctx.fillStyle=s.boss?'#120000':'#050505';ctx.fillRect(sx-size*.22,H/2-size*.5,size*.44,size*.9);ctx.fillStyle=s.t==='Smiler'?'#fff':s.boss?'#b00000':'#dcdcdc';ctx.fillRect(sx-size*.09,H/2-size*.2,size*.18,size*.035);ctx.fillStyle='#ff3333';ctx.fillRect(sx-size*.11,H/2-size*.35,size*.055,size*.055);ctx.fillRect(sx+size*.06,H/2-size*.35,size*.055,size*.055)} else {ctx.fillStyle=s.t=='lamp'?'#756b38':'#333';ctx.fillRect(sx-size*.05,H/2-size*.25,size*.1,size*.5)}ctx.globalAlpha=1});
 // flashlight vignette and rain
 if(flash){let g=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,Math.max(W,H)*.55);g.addColorStop(0,'rgba(255,255,220,.08)');g.addColorStop(.45,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.75)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}else{ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H)}
 ctx.strokeStyle='rgba(180,210,255,.35)';ctx.lineWidth=1;rain.forEach(r=>{r.y+=r.s*.004;if(r.y>1){r.y=0;r.x=Math.random()}let x=r.x*W,y=r.y*H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-12,y+30);ctx.stroke()}); if(Math.random()<.012){ctx.fillStyle='rgba(190,210,255,.16)';ctx.fillRect(0,0,W,H)}
 document.getElementById('top').innerHTML=`AREA ${area}/150 — ${biomes[biome()]}<br>HP ${Math.max(0,p.hp|0)} | Key ${hasKey?'YES':'NO'} | Flashlight ${flash?'ON':'OFF'}`;document.getElementById('msg').textContent=msg;document.getElementById('stam').style.width=p.stam+'%';}
let last=performance.now();function loop(t){let dt=Math.min(.05,(t-last)/1000);last=t;update(dt);render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script></body></html>
