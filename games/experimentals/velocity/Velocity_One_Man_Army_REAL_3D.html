<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velocity: One Man Army - REAL 3D</title>
<style>
html,body{margin:0;overflow:hidden;background:#87bff8;color:white;font-family:Arial,Helvetica,sans-serif;user-select:none}
canvas{display:block;background:linear-gradient(#6eb6ff 0%,#bfe6ff 42%,#6fbf5d 43%,#447a35 100%)}
#hud{position:fixed;left:14px;top:12px;background:rgba(0,0,0,.48);padding:12px 14px;border:1px solid rgba(255,255,255,.25);border-radius:14px;backdrop-filter:blur(5px);font-weight:bold;line-height:1.45;min-width:280px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
#title{font-size:22px;color:#ffe28a;text-shadow:0 0 8px #ffb52e;margin-bottom:4px}
#help{position:fixed;right:14px;top:12px;background:rgba(0,0,0,.45);padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.2);line-height:1.45;font-weight:bold}
#upgrade,#dead{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.68);z-index:5}
#panel{width:min(880px,94vw);background:linear-gradient(160deg,#1b2449,#0b1020);border:2px solid #f7d06a;border-radius:22px;padding:24px;box-shadow:0 0 40px #000}
#cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:18px;cursor:pointer;min-height:145px;transition:.14s}.card:hover{transform:translateY(-5px) scale(1.02);background:rgba(255,220,120,.18);border-color:#ffe28a}.card h3{margin:0 0 8px;color:#ffe28a}
#centerMsg{position:fixed;left:50%;top:22%;transform:translateX(-50%);font-size:40px;font-weight:900;color:#fff4b8;text-shadow:0 0 12px #000,0 0 25px #ffb52e;pointer-events:none;text-align:center;opacity:0;transition:.35s}
button{font-size:18px;border:0;border-radius:12px;padding:12px 18px;background:#f7d06a;color:#141014;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div id="title">Velocity: One Man Army</div><div id="stats"></div></div>
<div id="help">WASD move<br>Mouse move / Q E rotate camera<br>Left click / Space slash<br>Shift dash<br>Pick 3 upgrades every level</div>
<div id="centerMsg"></div>
<div id="upgrade"><div id="panel"><h1>Forge the Prince’s Sword</h1><p>Pick one upgrade. The armies grow bigger and angrier every wave.</p><div id="cards"></div></div></div>
<div id="dead"><div style="text-align:center"><h1>The Prince Has Fallen</h1><p id="deadText"></p><button onclick="location.reload()">Restart Kingdom</button></div></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;function resize(){W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H}resize();addEventListener('resize',resize);
const keys={};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.code==='Space')slash()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);addEventListener('mousedown',slash);
let mx=0,my=0;addEventListener('mousemove',e=>{mx=(e.clientX/W-.5)*2;my=(e.clientY/H-.5)*2});
const rand=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),len=(x,z)=>Math.hypot(x,z),dist=(a,b)=>len(a.x-b.x,a.z-b.z);
let camYaw=0,paused=false,wave=1,kills=0,shake=0,msgT=0,upgradeOpen=false;
const player={x:0,y:0,z:0,ang:0,hp:140,maxHp:140,dmg:26,range:92,speed:5.2,atk:0,dash:0,level:1,xp:0,next:32,gold:0,crit:.1,cleave:2,life:.02,shock:false,trail:[]};
let enemies=[],particles=[],gems=[],decor=[];
for(let i=0;i<150;i++)decor.push({x:rand(-2500,2500),z:rand(-2500,2500),s:rand(.7,1.8),t:Math.random()<.55?'tree':'rock'});
const ups=[['Royal Edge','Sword damage +14',p=>p.dmg+=14],['Longblade','Sword range +20',p=>p.range+=20],['Velocity Boots','Move speed +0.7',p=>p.speed+=.7],['Crown Guard','Max HP +45 and full heal',p=>{p.maxHp+=45;p.hp=p.maxHp}],['Cleave Rune','Hit +1 enemy each swing',p=>p.cleave++],['Blood Prince','More lifesteal',p=>p.life+=.045],['Thundersteel','Sword shocks clustered armies',p=>p.shock=true],['Critical Gem','Critical chance +14%',p=>p.crit+=.14],['Dash Engine','Shorter dash cooldown',p=>p.dash-=25]];
function msg(t){let m=document.getElementById('centerMsg');m.innerHTML=t;m.style.opacity=1;msgT=100}
function spawnWave(){msg('Wave '+wave+'<br><span style="font-size:22px">The army charges!</span>');let n=10+wave*5;for(let i=0;i<n;i++){let a=rand(0,Math.PI*2),d=rand(650,1150),type='grunt';if(Math.random()<.18+wave*.006)type='knight';if(wave%5===0&&i<2)type='captain';enemies.push(enemy(Math.cos(a)*d,Math.sin(a)*d,type))}}
function enemy(x,z,type){let e={x,z,y:0,ang:0,type,r:22,hp:45,maxHp:45,dmg:9,spd:1.55,col:'#8b2428',hit:0};if(type==='knight')Object.assign(e,{r:26,hp:80,maxHp:80,dmg:15,spd:1.25,col:'#333a55'});if(type==='captain')Object.assign(e,{r:40,hp:260+wave*25,maxHp:260+wave*25,dmg:25,spd:1.1,col:'#8427b0'});return e}
function slash(){if(paused||player.atk>0)return;player.atk=16;shake=7;let hits=0;enemies.sort((a,b)=>dist(player,a)-dist(player,b));for(const e of enemies){if(hits>=player.cleave)break;let d=dist(player,e);if(d<player.range+e.r){let dmg=player.dmg*(Math.random()<player.crit?2.7:1);e.hp-=dmg;e.hit=12;hits++;burst(e.x,30,e.z,18,'#ffe28a');player.hp=clamp(player.hp+dmg*player.life,0,player.maxHp);if(player.shock)for(const o of enemies)if(o!==e&&dist(e,o)<130){o.hp-=player.dmg*.38;o.hit=8;burst(o.x,45,o.z,7,'#95f2ff')}}}}
function burst(x,y,z,n,c){for(let i=0;i<n;i++)particles.push({x,y,z,vx:rand(-4,4),vy:rand(1,8),vz:rand(-4,4),life:rand(22,46),c})}
function gem(x,z,v){gems.push({x,z,y:15,v})}
function levelUp(){paused=upgradeOpen=true;let wrap=document.getElementById('upgrade'),cards=document.getElementById('cards');cards.innerHTML='';[...ups].sort(()=>Math.random()-.5).slice(0,3).forEach(u=>{let d=document.createElement('div');d.className='card';d.innerHTML=`<h3>${u[0]}</h3><p>${u[1]}</p>`;d.onclick=()=>{u[2](player);wrap.style.display='none';paused=upgradeOpen=false;msg('Sword upgraded:<br>'+u[0])};cards.appendChild(d)});wrap.style.display='flex'}
function update(){if(paused)return;if(keys.q)camYaw-=.045;if(keys.e)camYaw+=.045;camYaw+=mx*.018;let f={x:Math.sin(camYaw),z:Math.cos(camYaw)},r={x:Math.cos(camYaw),z:-Math.sin(camYaw)};let ix=0,iz=0;if(keys.w){ix+=f.x;iz+=f.z}if(keys.s){ix-=f.x;iz-=f.z}if(keys.d){ix+=r.x;iz+=r.z}if(keys.a){ix-=r.x;iz-=r.z}let l=len(ix,iz);if(l){ix/=l;iz/=l;player.ang=Math.atan2(ix,iz)}let sp=player.speed;if(keys.shift&&player.dash<=0&&l){sp*=4;player.dash=90;burst(player.x,15,player.z,16,'#bdf4ff')}player.x+=ix*sp;player.z+=iz*sp;player.x=clamp(player.x,-2300,2300);player.z=clamp(player.z,-2300,2300);player.dash=Math.max(0,player.dash-1);player.atk=Math.max(0,player.atk-1);player.trail.push({x:player.x,z:player.z,life:24});if(player.trail.length>30)player.trail.shift();
for(const e of enemies){let dx=player.x-e.x,dz=player.z-e.z,d=len(dx,dz)||1;e.ang=Math.atan2(dx,dz);e.x+=dx/d*e.spd*(1+wave*.018);e.z+=dz/d*e.spd*(1+wave*.018);e.hit=Math.max(0,e.hit-1);if(d<e.r+28){player.hp-=e.dmg*.035;shake=4}}
for(let i=enemies.length-1;i>=0;i--)if(enemies[i].hp<=0){let e=enemies[i];kills++;player.xp+=e.type==='captain'?18:e.type==='knight'?8:5;player.gold+=e.type==='captain'?16:5;gem(e.x,e.z,e.type==='captain'?18:6);burst(e.x,35,e.z,22,'#ff5555');enemies.splice(i,1)}
for(let i=gems.length-1;i>=0;i--){let g=gems[i],d=dist(player,g);g.y=18+Math.sin(Date.now()/180+i)*6;if(d<58){player.gold+=g.v;player.xp+=2;gems.splice(i,1)}else if(d<170){g.x+=(player.x-g.x)/d*6;g.z+=(player.z-g.z)/d*6}}
for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;p.vy-=.35;p.life--}particles=particles.filter(p=>p.life>0);
if(player.xp>=player.next){player.xp-=player.next;player.level++;player.next=Math.floor(player.next*1.45);levelUp()}if(!enemies.length&&!upgradeOpen){wave++;spawnWave()}if(player.hp<=0){document.getElementById('deadText').textContent=`You reached wave ${wave}, level ${player.level}, with ${kills} army soldiers defeated.`;document.getElementById('dead').style.display='flex';paused=true}if(msgT--<0)document.getElementById('centerMsg').style.opacity=0;shake*=.88}
function camera(){let back=470,up=250;return {x:player.x-Math.sin(camYaw)*back,y:up,z:player.z-Math.cos(camYaw)*back,yaw:camYaw,pitch:-0.46}}
function project(pt,cam){let x=pt.x-cam.x,y=pt.y-cam.y,z=pt.z-cam.z;let cy=Math.cos(-cam.yaw),sy=Math.sin(-cam.yaw);let x1=x*cy-z*sy,z1=x*sy+z*cy;let cp=Math.cos(-cam.pitch),sp=Math.sin(-cam.pitch);let y1=y*cp-z1*sp,z2=y*sp+z1*cp;if(z2<10)return null;let f=680/z2;return {x:W/2+x1*f+(Math.random()-.5)*shake,y:H/2-y1*f+(Math.random()-.5)*shake,s:f,z:z2}}
function poly(points,fill,stroke){let cam=CUR,ps=points.map(p=>project(p,cam));if(ps.some(p=>!p))return;ctx.beginPath();ctx.moveTo(ps[0].x,ps[0].y);for(let i=1;i<ps.length;i++)ctx.lineTo(ps[i].x,ps[i].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
function box(x,y,z,w,h,d,col){let X=w/2,Z=d/2,Y=h;let pts=[[x-X,y,z-Z],[x+X,y,z-Z],[x+X,y,z+Z],[x-X,y,z+Z],[x-X,y+Y,z-Z],[x+X,y+Y,z-Z],[x+X,y+Y,z+Z],[x-X,y+Y,z+Z]].map(a=>({x:a[0],y:a[1],z:a[2]}));poly([pts[4],pts[5],pts[6],pts[7]],shade(col,28));poly([pts[0],pts[1],pts[5],pts[4]],shade(col,-20));poly([pts[1],pts[2],pts[6],pts[5]],shade(col,0));poly([pts[2],pts[3],pts[7],pts[6]],shade(col,-35));poly([pts[3],pts[0],pts[4],pts[7]],shade(col,-10))}
function shade(hex,amt){let n=parseInt(hex.slice(1),16),r=clamp((n>>16)+amt,0,255),g=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);return `rgb(${r},${g},${b})`}
let CUR;
function drawCharacter(o,isP){let s=isP?1.05:o.r/24,hit=o.hit?35:0,base=isP?'#2757c9':o.col;box(o.x,0,o.z,22*s,38*s,18*s,shade(base,hit));box(o.x,40*s,o.z,16*s,18*s,16*s,isP?'#f0c283':'#c9b092');box(o.x,58*s,o.z,30*s,10*s,24*s,isP?'#e5c84a':'#555');
let ax=Math.sin(Date.now()/120+o.x*.01)*9*s;box(o.x-21*s,18*s,o.z,8*s,28*s,8*s,base);box(o.x+21*s,18*s,o.z,8*s,28*s,8*s,base);box(o.x-9*s,0,o.z+ax,8*s,22*s,8*s,'#1d2d54');box(o.x+9*s,0,o.z-ax,8*s,22*s,8*s,'#1d2d54');
let a=o.ang||0,sx=o.x+Math.sin(a)*36*s,sz=o.z+Math.cos(a)*36*s;if(isP){let swing=player.atk>0?Math.sin((16-player.atk)/16*Math.PI)*65:0;box(sx,24*s,sz,8*s,10*s+player.range*.42,8*s,'#dff7ff');if(player.atk>0){for(let k=0;k<5;k++){let aa=a+(-.7+k*.35);let p1={x:o.x+Math.sin(aa)*38,y:30,z:o.z+Math.cos(aa)*38};let p2={x:o.x+Math.sin(aa)*(player.range+swing),y:36,z:o.z+Math.cos(aa)*(player.range+swing)};let P1=project(p1,CUR),P2=project(p2,CUR);if(P1&&P2){ctx.strokeStyle='rgba(255,238,120,.7)';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(P1.x,P1.y);ctx.lineTo(P2.x,P2.y);ctx.stroke()}}}}}
function draw(){ctx.clearRect(0,0,W,H);CUR=camera();let cam=CUR;let sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#67b6ff');sky.addColorStop(.55,'#d8f3ff');sky.addColorStop(.56,'#78c45d');sky.addColorStop(1,'#356b2b');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
for(let x=-2500;x<=2500;x+=220){let a=project({x,y:1,z:-2500},cam),b=project({x,y:1,z:2500},cam);if(a&&b){ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}}for(let z=-2500;z<=2500;z+=220){let a=project({x:-2500,y:1,z},cam),b=project({x:2500,y:1,z},cam);if(a&&b){ctx.strokeStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}}
let drawables=[];for(const d of decor)drawables.push({z:len(d.x-cam.x,d.z-cam.z),fn:()=>{if(d.t==='tree'){box(d.x,0,d.z,18*d.s,65*d.s,18*d.s,'#7b4d28');box(d.x,60*d.s,d.z,70*d.s,55*d.s,70*d.s,'#1f7e33')}else box(d.x,0,d.z,45*d.s,28*d.s,40*d.s,'#777')}});for(const g of gems)drawables.push({z:len(g.x-cam.x,g.z-cam.z),fn:()=>box(g.x,g.y,g.z,20,20,20,'#ffd642')});for(const e of enemies)drawables.push({z:len(e.x-cam.x,e.z-cam.z),fn:()=>{drawCharacter(e,false);let p=project({x:e.x,y:82,z:e.z},cam);if(p){ctx.fillStyle='#300';ctx.fillRect(p.x-24,p.y,48,5);ctx.fillStyle='#ff4444';ctx.fillRect(p.x-24,p.y,48*(e.hp/e.maxHp),5)}}});for(const t of player.trail)drawables.push({z:len(t.x-cam.x,t.z-cam.z),fn:()=>box(t.x,1,t.z,26,4,26,'#83e7ff')});drawables.push({z:len(player.x-cam.x,player.z-cam.z),fn:()=>drawCharacter(player,true)});for(const p of particles)drawables.push({z:len(p.x-cam.x,p.z-cam.z),fn:()=>{let q=project(p,cam);if(q){ctx.globalAlpha=clamp(p.life/35,0,1);ctx.fillStyle=p.c;ctx.fillRect(q.x-4*q.s*20,q.y-4*q.s*20,8*q.s*20,8*q.s*20);ctx.globalAlpha=1}}});drawables.sort((a,b)=>b.z-a.z).forEach(d=>d.fn());
let hp=player.hp/player.maxHp,xp=player.xp/player.next;document.getElementById('stats').innerHTML=`Wave: ${wave} &nbsp; Kills: ${kills}<br>Level: ${player.level} &nbsp; Gold: ${player.gold}<br>HP: ${Math.ceil(player.hp)}/${player.maxHp}<div style="height:9px;background:#400;border-radius:8px"><div style="height:9px;width:${hp*100}%;background:#ff4444;border-radius:8px"></div></div>XP<div style="height:8px;background:#1c244a;border-radius:8px"><div style="height:8px;width:${xp*100}%;background:#ffd642;border-radius:8px"></div></div>Sword DMG ${Math.round(player.dmg)} | Range ${Math.round(player.range)} | Cleave ${player.cleave}`}
function loop(){update();draw();requestAnimationFrame(loop)}spawnWave();loop();
</script>
</body>
</html>
